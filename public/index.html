        const compressImage = (file, maxWidth = 1000, quality = 0.7) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        
                        resolve({
                            base64: compressedDataUrl.split(',')[1],
                            mimeType: 'image/jpeg'
                        });
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        };

        const BillTimer = ({ dueDate }) => {
            const [timeLeft, setTimeLeft] = useState(null);
            const [progressPercent, setProgressPercent] = useState(100);

            useEffect(() => {
                const calculateTime = () => {
                    if (!dueDate) return;
                    let target;
                    if(dueDate.includes('/')) {
                        const parts = dueDate.split('/');
                        target = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                    } else {
                        target = new Date(dueDate);
                    }
                    target.setHours(23, 59, 59); 
                    const now = new Date();
                    const diff = target - now;

                    if (diff <= 0) { setTimeLeft(null); return; }

                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    setTimeLeft({ days, hours, minutes, seconds });

                    const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
                    let pct = (diff / THIRTY_DAYS_MS) * 100;
                    if (pct > 100) pct = 100;
                    if (pct < 0) pct = 0;
                    setProgressPercent(pct);
                };

                calculateTime();
                const timer = setInterval(calculateTime, 1000);
                return () => clearInterval(timer);
            }, [dueDate]);

            if (!timeLeft) return null;

            const { days, hours, minutes, seconds } = timeLeft;
            let label = ""; let unit = "";
            let color = "#10B981"; let bgColor = "#ECFDF5"; 
            let isUrgent = false;

            if (days > 0) {
                label = days; unit = "วัน";
                if (days <= 3) { color = "#d97706"; bgColor = "#FFFBEB"; } 
                else { color = "#059669"; bgColor = "#ECFDF5"; }

                label = hours; unit = "ชม."; color = "#EA580C"; bgColor = "#FFF7ED"; isUrgent = true; 
            } else {
                label = `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`; unit = ""; 
                color = "#DC2626"; bgColor = "#FEF2F2"; isUrgent = true; 
            }
            
            return (
                <div className={`relative flex items-center justify-center w-12 h-12 ml-3 rounded-xl shadow-sm flex-shrink-0 transition-colors duration-300 ${isUrgent ? 'animate-pulse border-red-200' : 'border-gray-100'}`} style={{ backgroundColor: bgColor }}>

                    Swal.fire({ toast: true, position: 'top', icon: 'warning', title: 'กรุณาเลือกตัวเลือกให้ครบ', showConfirmButton: false, timer: 2000 });
                    return;
                }
                let sizeDetail = optionGroups.length > 0 ? Object.entries(selections).map(([key, val]) => `${key}: ${val.label}${val.price > 0 ? ` (+${val.price})` : ''}`).join(', ') : "-";
                onConfirm({ ...product, size: sizeDetail, qty, price: currentPrice, total, img: images[0] });
            };

            const handleSelect = (groupName, choice) => {

            return (
                <div className="absolute inset-0 bg-[#F0F4F8] z-50 animate-slide-in-right overflow-y-auto no-scrollbar pb-32">

                                        </div>

                            </div>
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-50 mb-6">
                                <h3 className="text-2xl font-extrabold text-gray-900 leading-tight">{product.name}</h3>

                                    <button onClick={() => setShowSizeChart(true)} className="w-full bg-blue-50/70 hover:bg-blue-100 text-blue-700 py-3.5 rounded-2xl text-sm font-bold transition flex items-center justify-center gap-2 active:scale-95 mb-5 border border-blue-100/50">
                                        <i className="fa-solid fa-ruler-combined text-lg"></i> ดูตารางไซส์ / รายละเอียด

                                {optionGroups.map((group, idx) => (

                                            {group.choices.map((choice, cIdx) => {

                                                        <span>{choice.label}</span>

                                            <button onClick={() => setQty(q => Math.min(product.stock, q + 1))} disabled={qty >= product.stock} className={`w-9 h-9 rounded-full flex items-center justify-center text-lg font-bold shadow-sm transition active:scale-90 ${qty >= product.stock ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'bg-white text-[#0066FF]'}`}><i className="fa-solid fa-plus"></i></button>

                                <div className="relative w-full h-full flex items-center justify-center" onClick={(e) => e.stopPropagation()}>

                                        <>
                                            <button onClick={(e) => {e.stopPropagation(); setCurrentSizeChartIndex((prev) => (prev - 1 + sizeCharts.length) % sizeCharts.length);}} className="absolute left-2 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 text-white rounded-full flex items-center justify-center transition shadow-xl active:scale-90"><i className="fa-solid fa-chevron-left text-xl"></i></button>
                                            <button onClick={(e) => {e.stopPropagation(); setCurrentSizeChartIndex((prev) => (prev + 1) % sizeCharts.length);}} className="absolute right-2 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 text-white rounded-full flex items-center justify-center transition shadow-xl active:scale-90"><i className="fa-solid fa-chevron-right text-xl"></i></button>
                                        </>
                                    )}
                                </div>
                                <p className="text-white/60 text-sm mt-4 font-medium"><i className="fa-solid fa-magnifying-glass-plus mr-2"></i>สามารถซูมดูรายละเอียดได้</p>
                            </div>, document.body
                        )}

                        {/* 🌟 หน้าต่าง Fullscreen สำหรับรูปสินค้า */}
                        {showProductImage && ReactDOM.createPortal(
                            <div className="fixed inset-0 z-[9999] bg-black/95 flex flex-col items-center justify-center animate-[fadeIn_0.2s_ease-out] p-4" onClick={() => setShowProductImage(false)}>
                                <button onClick={() => setShowProductImage(false)} className="absolute top-5 right-5 text-white w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center backdrop-blur-md z-50 transition active:scale-90"><i className="fa-solid fa-xmark text-2xl"></i></button>
                                <div className="relative w-full h-full flex items-center justify-center" onClick={(e) => e.stopPropagation()}>
                                    <img src={getDirectDriveUrl(images[currentImgIndex])} className="max-w-full max-h-full object-contain rounded-2xl" />
                                    {images.length > 1 && (
                                        <>
                                            <button onClick={(e) => {e.stopPropagation(); setCurrentImgIndex((prev) => (prev - 1 + images.length) % images.length);}} className="absolute left-2 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 text-white rounded-full flex items-center justify-center transition shadow-xl active:scale-90"><i className="fa-solid fa-chevron-left text-xl"></i></button>
                                            <button onClick={(e) => {e.stopPropagation(); setCurrentImgIndex((prev) => (prev + 1) % images.length);}} className="absolute right-2 top-1/2 -translate-y-1/2 w-12 h-12 bg-white/20 text-white rounded-full flex items-center justify-center transition shadow-xl active:scale-90"><i className="fa-solid fa-chevron-right text-xl"></i></button>
                                        </>
                                    )}
                                </div>
                                <p className="text-white/60 text-sm mt-4 font-medium"><i className="fa-solid fa-magnifying-glass-plus mr-2"></i>แตะด้านนอกเพื่อปิดหน้าต่าง</p>
                            </div>, document.body
                        )}
                    </div>
                </div>
            );
        };
        
        const PaymentModal = ({ bill, user, onClose, onSuccess }) => {
            const [file, setFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [progress, setProgress] = useState(0); 

            const handleFile = (e) => {
                const f = e.target.files[0];
                if(f && f.size <= 5*1024*1024) { setFile(f); setPreview(URL.createObjectURL(f)); } 
                else { fireErrorAlert('ไฟล์ขนาดใหญ่เกินไป', 'กรุณาอัปโหลดรูปภาพขนาดไม่เกิน 5MB'); }
            };

           const submit = async () => {
                if(!file) return;
                setIsSubmitting(true); setProgress(30);
            
                try {
                    const compressedImg = await compressImage(file, 1000, 0.7);
                    setProgress(50);
            
                    const payload = { 
                        billId: bill.billId, studentId: user.studentId, studentName: user.name, 
                        studentLineId: user.userId || user.lineId, item: bill.item, total: bill.total,
                        fileName: `bill_${user.studentId}_${Date.now()}.jpg`, mimeType: compressedImg.mimeType, fileData: compressedImg.base64
                    };
                    
                    const res = await runGoogleScript('submitPaymentViaFirebase', [payload]);
                    setProgress(70);
            
                    if(res.success) {
                        const transRef = res.transRef;
                        
                        // 1. เช็คสลิปซ้ำ
                        if (transRef) {
                            const slipDoc = await db.collection('transRefs').doc(transRef).get();
                            if (slipDoc.exists) throw new Error('สลิปนี้ถูกใช้งานไปแล้วในระบบ ห้ามใช้ซ้ำเด็ดขาด');
                            
                            // 🌟 บันทึกรหัสอ้างอิง พร้อมระบุว่าใครเป็นคนใช้ (รหัส และ ชื่อ)
                            await db.collection('transRefs').doc(transRef).set({
                                status: "used", 
                                type: "Success", 
                                usedAt: new Date().toISOString(), 
                                usedBy: String(user.studentId),    // เก็บระหัสนักศึกษา
                                usedByName: user.name              // เก็บชื่อนักศึกษาด้วย แอดมินจะได้ดูง่าย
                            });
                        }
                        
                        setProgress(80);

                        // 2. อัปเดตข้อมูลบิล
                        const payIsoDate = new Date().toISOString(); 
                        let updateBillData = {
                            status: res.isUnderpaid ? "" : res.status, // ถ้ายอดขาด ให้สถานะหน้าบิลว่างไว้
                            slipUrl: res.slipUrl, 
                            payDate: payIsoDate
                        };
                        
                        // ถ้ายอดไม่ครบ นำไปทบเป็นส่วนลด
                        if (res.isUnderpaid) {
                            const currentDiscount = Number(bill.discount || 0);
                            updateBillData.discount = currentDiscount + Number(res.actualAmount);
                        }

                        await db.collection('users').doc(user.studentId).collection('bills').doc(bill.billId).update(updateBillData);
                        
                        setProgress(90);

                        // 3. จัดการประวัติ (ปรับปรุงฟิลด์ให้ตรงตามรูปฐานข้อมูล)
                        const historyRef = db.collection('users').doc(user.studentId).collection('history');
                        const historySnapshot = await historyRef.where('billId', '==', bill.billId).get();

                        let accumulatedTotal = Number(res.actualAmount);
                        let historyDocId = null;

                        if (!historySnapshot.empty) {
                            const oldDoc = historySnapshot.docs[0];
                            historyDocId = oldDoc.id;
                            accumulatedTotal += Number(oldDoc.data().total || 0); 
                        }

                        // โครงสร้างข้อมูลประวัติ
                        const historyData = {
                            amount: accumulatedTotal,           
                            billId: bill.billId,
                            item: bill.item,
                            name: user.name,                    
                            payDate: payIsoDate,
                            slipUrl: res.slipUrl,
                            status: res.status,
                            studentId: String(user.studentId),  
                            total: accumulatedTotal,            
                            timestamp: Date.now()               
                        };

                        if (historyDocId) {
                            await historyRef.doc(historyDocId).update(historyData);
                        } else {
                            await historyRef.add(historyData);
                        }

                        // 4. ส่ง LINE แจ้งเตือน
                        await runGoogleScript('notifyPayment', [{
                            payload: payload, status: res.status, slipUrl: res.slipUrl, 
                            isUnderpaid: res.isUnderpaid, actualAmount: res.actualAmount, 
                            isOverpaid: res.isOverpaid, message: res.message
                        }]);
                        
                        setProgress(100);
                        onClose(); // ปิดหน้าต่างโหลด

                        // 🌟 สร้างตัวแปรแยกข้อความป๊อปอัปให้สวยงาม
                        let popupIcon = 'success';
                        let popupTitle = 'ชำระเงินเรียบร้อย!';
                        let popupHtml = `<p class="text-sm text-gray-500 mt-2">ระบบตรวจสอบสลิปถูกต้อง และบันทึกข้อมูลสำเร็จแล้ว</p>`;
                        let btnColor = '#0066FF'; // สีปุ่มปกติ (น้ำเงิน)

                        if (res.isUnderpaid) {
                            // กรณีที่ 1: โอนเงินมา "ขาด" (ยอดไม่ครบ)
                            popupIcon = 'warning'; 
                            popupTitle = 'ยอดเงินไม่ครบ';
                            popupHtml = `
                                <div class="mt-4 space-y-3">
                                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                                        <span class="text-xs text-gray-500 font-medium">ยอดบิลทั้งหมด</span>
                                        <span class="text-sm font-bold text-gray-800">${bill.total} ฿</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-red-50 p-3 rounded-xl border border-red-100">
                                        <span class="text-xs text-red-500 font-medium">ยอดโอนจริง</span>
                                        <span class="text-sm font-bold text-red-600">${res.actualAmount} ฿</span>
                                    </div>
                                    <div class="p-3 bg-orange-50 rounded-xl border border-orange-100 text-left">
                                        <p class="text-[11px] text-orange-600 font-medium leading-relaxed">
                                            <i class="fa-solid fa-circle-info mr-1"></i>ระบบนำยอดโอนไปหักลบเป็นส่วนลดให้แล้ว<br/>กรุณาชำระส่วนที่เหลือด้วยนะครับ
                                        </p>
                                    </div>
                                </div>`;
                            btnColor = '#F59E0B'; // สีปุ่มส้ม
                        } 
                        else if (res.isOverpaid) {
                            // กรณีที่ 2: โอนเงินมา "เกิน"
                            popupIcon = 'info';
                            popupTitle = 'โอนยอดเกิน';
                            popupHtml = `
                                <div class="mt-4 space-y-3">
                                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                                        <span class="text-xs text-gray-500 font-medium">ยอดบิลทั้งหมด</span>
                                        <span class="text-sm font-bold text-gray-800">${bill.total} ฿</span>
                                    </div>
                                    <div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl border border-blue-100">
                                        <span class="text-xs text-blue-500 font-medium">ยอดโอนจริง</span>
                                        <span class="text-sm font-bold text-blue-600">${res.actualAmount} ฿</span>
                                    </div>
                                    <div class="p-3 bg-sky-50 rounded-xl border border-sky-100 text-left">
                                        <p class="text-[11px] text-sky-600 font-medium leading-relaxed">
                                            <i class="fa-solid fa-clock-rotate-left mr-1"></i>แอดมินกำลังตรวจสอบ<br/>จะนำเงินไปทบให้ในบิลถัดไป
                                        </p>
                                    </div>
                                </div>`;
                            btnColor = '#0EA5E9'; // สีปุ่มฟ้า
                        } 
                        else if (res.status === 'รอตรวจสอบ') {
                            // กรณีที่ 3: ระบบ SlipOK ล่ม (โอนไปโหมดรอตรวจสอบแบบ Manual)
                            popupIcon = 'info';
                            popupTitle = 'ส่งข้อมูลสำเร็จ';
                            popupHtml = `
                                <div class="mt-4 space-y-3">
                                    <p class="text-sm text-gray-500">ระบบตรวจสอบอัตโนมัติอาจขัดข้องชั่วคราว</p>
                                    <div class="p-3 bg-blue-50 rounded-xl border border-blue-100 text-left">
                                        <p class="text-xs text-blue-600 font-medium leading-relaxed">
                                            <i class="fa-solid fa-user-shield mr-1"></i>ระบบได้ส่งสลิปให้แอดมินตรวจสอบด้วยตนเองแล้ว รออัปเดตสถานะสักครู่นะครับ
                                        </p>
                                    </div>
                                </div>`;
                            btnColor = '#0EA5E9';
                        }

                        // แสดง Popup กรณีอัปโหลดและประมวลผลผ่าน
                        Swal.fire({
                            icon: popupIcon,
                            title: `<span class="text-xl font-black text-gray-800 tracking-tight">${popupTitle}</span>`,
                            html: popupHtml,
                            confirmButtonColor: btnColor,
                            confirmButtonText: 'ตกลง',
                            customClass: {
                                popup: 'rounded-[2rem] shadow-2xl border border-gray-100',
                                confirmButton: 'rounded-xl font-bold px-8 py-3 text-sm shadow-md transition-all',
                                htmlContainer: 'm-0 p-0'
                            }
                        }).then(() => {
                            onSuccess(); // รีเฟรชหน้าเว็บหลังจากกดปุ่มตกลง
                        });

                    } else {
                        // 🌟 ดึงข้อความแจ้งเตือนจากระบบหลังบ้านมาเช็ค
                        let errorMsg = res.message || res.error || 'สลิปไม่ถูกต้อง';
                        let errTitle = 'ตรวจสอบสลิปไม่ผ่าน';
                        let errIcon = 'error';
                        let errColor = '#EF4444';
                        let errHtml = '';

                        // 🔍 แยกประเภท Error ให้ชัดเจนตามคำที่เจอ
                        if (errorMsg.includes('บัญชีปลายทาง')) {
                            errTitle = 'โอนเงินผิดบัญชี!';
                            errHtml = `
                                <div class="mt-3 space-y-3">
                                    <p class="text-sm text-gray-600">${errorMsg}</p>
                                    <div class="p-3 bg-red-50 text-red-600 rounded-xl text-[11px] font-medium border border-red-100 text-left">
                                        <i class="fa-solid fa-building-columns mr-1"></i>กรุณาตรวจสอบบัญชีรับเงินให้ตรงกับของระบบ
                                    </div>
                                </div>`;
                        } 
                        else if (errorMsg.includes('QR') || errorMsg.includes('ไม่พบ')) {
                            errTitle = 'ไม่พบ QR Code ยืนยัน';
                            errIcon = 'warning';
                            errColor = '#F59E0B';
                            errHtml = `
                                <div class="mt-3 space-y-3">

                                    <div className="flex justify-between items-center mt-3 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                        <div>

        const calculateBillData = (bill, qrMap, defaultQr) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let fine = 0;
            let daysLate = 0;
            
            if (bill.dueDate && bill.status !== 'ชำระแล้ว') {
                let dueDateObj;
                if(String(bill.dueDate).includes('/')) {
                    const parts = String(bill.dueDate).split('/');
                    dueDateObj = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
                } else {
                    dueDateObj = new Date(bill.dueDate);
                }
                dueDateObj.setHours(0, 0, 0, 0);
                
                if (today.getTime() > dueDateObj.getTime()) {
                    const diffTime = today.getTime() - dueDateObj.getTime();
                    daysLate = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    fine = daysLate * (bill.dailyFine || 0);
                    if (bill.maxFine > 0 && fine > bill.maxFine) fine = bill.maxFine;
                }
            }
            
            const total = (Number(bill.amount) - Number(bill.discount || 0)) + fine;
            // 🌟 บังคับแปลง total ให้เป็น String เพื่อให้จับคู่กับ Key ใน qrMap ได้ชัวร์ๆ
            const strTotal = String(total);
            const selectedQr = qrMap && qrMap[strTotal] ? qrMap[strTotal] : defaultQr;
            
            return { ...bill, fine, daysLate, total, qrCode: selectedQr };
        };
        
        // 🌟 Fullscreen Gallery Component สำหรับขยายรูปภาพ
        const FullscreenImageViewer = ({ isOpen, images, startIndex, onClose }) => {
            const [currentIndex, setCurrentIndex] = useState(startIndex);

            useEffect(() => { // รีเซ็ต currentIndex เมื่อ props เปลี่ยน
                setCurrentIndex(startIndex);
            }, [isOpen, images, startIndex]);

            if (!isOpen || images.length === 0) return null;

            const handleNext = () => {
                setCurrentIndex((prevIndex) => (prevIndex + 1) % images.length);
            };

            const handlePrev = () => {
                setCurrentIndex((prevIndex) => (prevIndex - 1 + images.length) % images.length);
            };

            return (
                <div className="fixed inset-0 z-[999] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 animate-fadeIn" onClick={onClose}>
                    <div className="relative w-full h-full flex flex-col items-center justify-center" onClick={(e) => e.stopPropagation()}>
                        
                        {/* 🌟 แสดงรูปภาพในระดับ Fullscreen */}

                                <button onClick={handleNext} className="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center backdrop-blur-sm transition-all text-xl"><i className="fa-solid fa-chevron-right"></i></button>

                        {/* 🌟 ปุ่มปิด */}

        const Dashboard = ({ user, setUser, initialData, onLogout }) => {
            const [data, setData] = useState(initialData || {});
            const [loading, setLoading] = useState(false);
            const [tab, setTab] = useState('home'); 
            const [showDropdown, setShowDropdown] = useState(false);
            
            const [selectedBill, setSelectedBill] = useState(null);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [pendingOrder, setPendingOrder] = useState(null);
            const [selectedProject, setSelectedProject] = useState(null); 
            const [trackingOrder, setTrackingOrder] = useState(null);
            const [viewSlipUrl, setViewSlipUrl] = useState(null);
            const [showAnnouncement, setShowAnnouncement] = useState(false); 
            
            const [financeSort, setFinanceSort] = useState('desc');

            const [viewerProps, setViewerProps] = useState({ isOpen: false, images: [], startIndex: 0 });

            // 🌟 ใช้งาน Firestore แบบ Real-time (onSnapshot) 🌟
            useEffect(() => {
                const studentId = user.studentId;
                setLoading(true);
                const unsubscribes = [];

                // 🛠️ ฟังก์ชันช่วยแปลงวันที่ทุกรูปแบบเป็นตัวเลข เพื่อใช้เรียงลำดับ (ล่าสุดขึ้นก่อน)
                const getSortTime = (dateStr, timestamp) => {
                    if (timestamp) return Number(timestamp); 
                    if (!dateStr) return 0;
                    
                    // 1. ลองแปลงแบบสากลก่อน (เช่น 2024-07-04T17:00:00.000Z)
                    const time = new Date(dateStr).getTime();
                    if (!isNaN(time)) return time;
                    
                    // 2. ถ้าพัง แสดงว่าเป็นรูปแบบไทย (เช่น 31/03/2569 14:30:00) ให้ตัดคำมาคำนวณเอง
                    try {
                        const parts = String(dateStr).split(' ');
                        const dPart = parts[0].split('/');
                        if (dPart.length === 3) {
                            const day = parseInt(dPart[0], 10);
                            const month = parseInt(dPart[1], 10) - 1;
                            let year = parseInt(dPart[2], 10);
                            if (year > 2500) year -= 543; // แปลง พ.ศ. เป็น ค.ศ.
                            
                            const tPart = (parts[1] || '00:00:00').split(':');
                            const hr = parseInt(tPart[0] || 0, 10);
                            const min = parseInt(tPart[1] || 0, 10);
                            const sec = parseInt(tPart[2] || 0, 10);
                            
                            return new Date(year, month, day, hr, min, sec).getTime();
                        }
                    } catch (e) {}
                    return 0;
                };

                // 1. ดึงการตั้งค่าระบบ 
                unsubscribes.push(
                    db.collection('config').doc('system').onSnapshot(doc => {
                        if (doc.exists) {
                            const d = doc.data();
                            setData(prev => ({ 
                                ...prev, 
                                announcement: d.announcement, 
                                // 🌟 เช็คให้ชัวร์ว่าต้องเป็นคำว่า 'ON' หรือค่าแบบ true เท่านั้นถึงจะเปิดร้าน
                                orderEnabled: d.orderSystem === 'ON' || d.orderSystem === true
                            }));
                        }
                    })
                );

                // 2. ดึง QR Map 
                unsubscribes.push(
                    db.collection('config').doc('qrMap').onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            const codesArray = data.codes || []; 
                            const newQrMap = {};
                            let defaultUrl = "https://placehold.co/200?text=No+QR+Found";

                            codesArray.forEach(item => {
                                if (item && item.amount !== undefined) {
                                    const amt = String(item.amount);
                                    newQrMap[amt] = String(item.url); 
                                    if (amt === "0") {
                                        defaultUrl = String(item.url); 
                                    }
                                }
                            });

                            setData(prev => ({ 
                                ...prev, 
                                qrMap: newQrMap, 
                                defaultQr: defaultUrl 
                            }));
                        }
                    })
                );

                // 3. ดึงข้อมูลบิล 
                unsubscribes.push(
                    db.collection('users').doc(studentId).collection('bills').onSnapshot(snap => {
                        const billsArray = snap.docs
                            .map(doc => ({ billId: doc.id, ...doc.data() }))
                            .filter(bill => bill.status !== 'ชำระแล้ว'); 
                    
                        setData(prev => {
                            const processedBills = billsArray.map(b => calculateBillData(b, prev.qrMap, prev.defaultQr));
                            return { ...prev, bills: processedBills };
                        });
                    })
                );

                // 4. ดึงข้อมูลออเดอร์เสื้อ (🌟 เรียงลำดับจากวันที่)
                unsubscribes.push(
                    db.collection('users').doc(studentId).collection('orders').onSnapshot(snap => {
                        const ordersArray = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        const sortedOrders = ordersArray.sort((a, b) => getSortTime(b.date, b.timestamp) - getSortTime(a.date, a.timestamp));
                        setData(prev => ({ ...prev, orders: sortedOrders }));
                    })
                );

                // 5. ดึงประวัติการชำระเงิน (🌟 เรียงลำดับจากวันที่)
                unsubscribes.push(
                    db.collection('users').doc(studentId).collection('history').onSnapshot(snap => {
                        const histArray = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        const sortedHistory = histArray.sort((a, b) => getSortTime(b.payDate, b.timestamp) - getSortTime(a.payDate, a.timestamp));
                        setData(prev => ({ ...prev, history: sortedHistory }));
                    })
                );

                // 6. ดึงข้อมูลสินค้า
                unsubscribes.push(
                    db.collection('products').onSnapshot(snap => {
                        const prodArray = snap.docs.map(doc => {
                            const prodData = doc.data();
                            
                            const productGallery = [prodData.image].filter(Boolean); 
                            for (let i = 2; i <= 10; i++) { 
                                const key = `image${i}`;
                                if (prodData[key]) productGallery.push(prodData[key]);
                            }

                            const sizeChartGallery = [prodData.sizeChart].filter(Boolean); 
                            for (let i = 2; i <= 5; i++) { 
                                const key = `sizeChart${i}`;
                                if (prodData[key]) sizeChartGallery.push(prodData[key]);
                            }

                            return { 
                                id: doc.id, 
                                ...prodData, 
                                productGallery, 
                                sizeChartGallery 
                            };
                        });
                        setData(prev => ({ ...prev, products: prodArray }));
                    })
                );
                
                // 7. ดึงยอดสรุปการเงินรวม
                unsubscribes.push(
                    db.collection('finance').doc('summary').collection('logs').onSnapshot(doc => {
                        if (doc.exists) {
                            const d = doc.data();
                            setData(prev => ({ 
                                ...prev, 
                                finance: { 
                                    ...(prev.finance || { projects: [] }), 
                                    balance: d.balance || 0, 
                                    income: d.income || 0, 
                                    expense: d.expense || 0 
                                } 
                            }));
                        }
                    })
                );

                // 8. ดึงข้อมูล log การเงิน (🌟 คำนวณยอดรวมอัตโนมัติจาก Logs)
                unsubscribes.push(
                    db.collection('finance').doc('summary').collection('logs').onSnapshot(snap => {
                        const logsArray = snap.docs.map(doc => doc.data());
                        const groupedProjects = {};
                        
                        // 🌟 สร้างตัวแปรเก็บยอดรวมทั้งหมด
                        let totalIncome = 0;
                        let totalExpense = 0;
                        
                        logsArray.forEach(log => {
                            const amt = Number(log.amount) || 0;
                            const isIncome = log.type === 'รายรับ';
                            
                            // 🌟 บวกยอดรวมทั้งหมดของชั้นปี
                            if (isIncome) totalIncome += amt;
                            else totalExpense += amt;

                            const pName = log.project; 
                            if (!pName || String(pName).trim() === '' || pName === 'ทั่วไป') return;
                            
                            if (!groupedProjects[pName]) {
                                groupedProjects[pName] = { id: pName, name: pName, income: 0, expense: 0, transactions: [] };
                            }
                            
                            if (isIncome) groupedProjects[pName].income += amt;
                            else groupedProjects[pName].expense += amt;
                            
                            groupedProjects[pName].transactions.push({
                                type: isIncome ? 'income' : 'expense',
                                amount: amt,
                                item: log.item || '-',
                                responsible: log.person || '-',
                                date: formatThaiDateTime(log.date), 
                                receiptUrl: log.receiptUrl || '',
                                transferSlipUrl: log.slipUrl || log.transferSlipUrl || '', 
                                timestamp: getSortTime(log.date, log.timestamp)
                            });
                        });

                        const projectsArray = Object.values(groupedProjects).map(p => {
                            p.transactions.sort((a, b) => b.timestamp - a.timestamp);
                            return p;
                        });

                        // 🌟 อัปเดตข้อมูลการเงินทั้งหมด (ยอดรวม + โปรเจกต์)
                        setData(prev => ({ 
                            ...prev, 
                            finance: { 
                                balance: totalIncome - totalExpense, 
                                income: totalIncome, 
                                expense: totalExpense, 
                                projects: projectsArray 
                            } 
                        }));
                    })
                );
                setLoading(false);

                return () => unsubscribes.forEach(unsub => unsub());
            }, [user.studentId]);

            // 🌟 ฟังก์ชันเพื่อเปิดตัวขยายรูปภาพ
            const openImageViewer = (imagesArray, index = 0) => {
                setViewerProps({ isOpen: true, images: imagesArray, startIndex: index });
            };

            // 🌟 ฟังก์ชันเพื่อปิดตัวขยายรูปภาพ
            const closeImageViewer = () => {
                setViewerProps({ isOpen: false, images: [], startIndex: 0 });
            };

            const handleTabChange = (newTab) => {
                setTab(newTab);
                setSelectedBill(null);
                setSelectedProduct(null);
                setPendingOrder(null);
                setSelectedProject(null);
                setTrackingOrder(null);

            const handleOpenPayment = (bill) => {
                if (bill.status === 'ชำระแล้ว' || bill.status === 'รอตรวจสอบ') {
                    Swal.fire({ icon: 'info', title: 'สถานะถูกอัปเดตแล้ว', text: `บิลนี้อยู่ในสถานะ "${bill.status}" ไม่สามารถชำระซ้ำได้ครับ`, confirmButtonColor: '#0066FF', customClass: { popup: 'rounded-3xl' } });
                } else {
                    setSelectedBill(bill);
                }
            };

            const handleLogoutConfirm = () => {
                Swal.fire({
                    title: 'ออกจากระบบ?',
                    text: "คุณต้องการออกจากระบบใช่หรือไม่?",
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#EF4444',
                    cancelButtonColor: '#E5E7EB',
                    confirmButtonText: 'ออกจากระบบ',
                    cancelButtonText: '<span class="text-gray-700">ยกเลิก</span>',
                    customClass: { popup: 'rounded-3xl', confirmButton: 'rounded-xl px-6 py-2.5 font-bold shadow-md', cancelButton: 'rounded-xl px-6 py-2.5 font-bold' }
                }).then((result) => {
                    if (result.isConfirmed) {
                        onLogout();
                    }
                });
            };

            const themeText = "text-[#0066FF]";

            useEffect(() => {
                if (data?.announcement) setShowAnnouncement(true);
            }, [data?.announcement]);

            const hasAccess = (menuId) => {
                if (!user?.permissions || !Array.isArray(user.permissions)) return true;
                return user.permissions.includes(menuId);
            };

            const overdueCount = data?.bills ? data.bills.filter(b => b.daysLate > 0 && b.status !== 'รอตรวจสอบ').length : 0;
            const hasBills = data?.bills && data.bills.length > 0;
            const activeOrders = data?.orders ? data.orders.filter(o => o.status?.trim() !== 'รับแล้ว' && o.status?.trim() !== 'ยกเลิก') : [];
            const hasActiveOrders = activeOrders.length > 0;
            
            const isSubPageOpen = selectedBill || selectedProduct || pendingOrder || selectedProject || trackingOrder;

            // 🌟 วางทับ handleChangePassword ตัวเดิม (เปลี่ยนรหัสได้ทุกกรณี)
            const handleChangePassword = async () => {
                setShowDropdown(false);

                await Swal.fire({
                    title: 'เปลี่ยนรหัสผ่าน',
                    html: `
                        <div class="space-y-4 mt-4 text-left">
                            <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"><i class="fa-solid fa-lock"></i></span><input id="old-pass" type="password" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#0066FF] outline-none text-sm shadow-sm transition-all" placeholder="รหัสผ่านเดิม"></div>
                            <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"><i class="fa-solid fa-key"></i></span><input id="new-pass" type="password" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#0066FF] outline-none text-sm shadow-sm transition-all" placeholder="รหัสผ่านใหม่ (อย่างน้อย 6 ตัวอักษร)"></div>
                            <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"><i class="fa-solid fa-check-double"></i></span><input id="confirm-pass" type="password" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#0066FF] outline-none text-sm shadow-sm transition-all" placeholder="ยืนยันรหัสผ่านใหม่"></div>
                        </div>
                    `,
                    showCancelButton: true, confirmButtonText: 'บันทึกรหัสผ่าน', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#0066FF', showLoaderOnConfirm: true,
                    customClass: { popup: 'rounded-3xl pb-6', title: 'text-xl font-bold text-gray-800', confirmButton: 'rounded-xl px-6 py-2.5 font-bold shadow-md text-sm', cancelButton: 'rounded-xl px-6 py-2.5 font-bold text-sm bg-gray-100 text-gray-600 hover:bg-gray-200' },
                    preConfirm: async () => {
                        const oldInput = document.getElementById('old-pass'); const newInput = document.getElementById('new-pass'); const confirmInput = document.getElementById('confirm-pass');
                        const oldP = oldInput.value; const newP = newInput.value; const cNewP = confirmInput.value;
                        [oldInput, newInput, confirmInput].forEach(el => { el.classList.remove('border-red-500', 'bg-red-50', 'ring-2', 'ring-red-200'); el.classList.add('border-gray-200', 'bg-gray-50'); });
                        const setError = (inputEl, errorMsg) => { inputEl.classList.remove('border-gray-200', 'bg-gray-50'); inputEl.classList.add('border-red-500', 'bg-red-50', 'ring-2', 'ring-red-200'); Swal.showValidationMessage(errorMsg); return false; };
                        if (!oldP) return setError(oldInput, 'กรุณากรอกรหัสผ่านเดิม'); if (!newP) return setError(newInput, 'กรุณากรอกรหัสผ่านใหม่'); if (!cNewP) return setError(confirmInput, 'กรุณายืนยันรหัสผ่านใหม่');
                        if (newP.length < 6) return setError(newInput, 'รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร'); if (newP !== cNewP) return setError(confirmInput, 'ยืนยันรหัสผ่านไม่ตรงกัน');
                        
                        try { 
                            const email = `${user.studentId}@ptu.ac.th`;
                            let isAuthAccountExists = true;
                            
                            try {
                                // 🌟 ทริคพิเศษ: ลองล็อกอินด้วยอีเมล+รหัสผ่านเดิม เพื่อดึง Session เข้าสู่บัญชีอีเมล (แก้ปัญหา Mismatch)
                                await auth.signInWithEmailAndPassword(email, oldP);
                            } catch (authErr) {
                                if (authErr.code === 'auth/wrong-password' || authErr.code === 'auth/invalid-credential' || authErr.code === 'auth/invalid-login-credentials') {
                                    throw new Error('รหัสผ่านเดิมไม่ถูกต้อง');
                                } else if (authErr.code === 'auth/user-not-found') {
                                    // 🌟 กรณีที่ 2: ยังไม่เคยมีบัญชี Firebase Auth (เปลี่ยนรหัสครั้งแรก)
                                    isAuthAccountExists = false;
                                    const userDoc = await db.collection('users').doc(user.studentId).get();
                                    if (!userDoc.exists || userDoc.data().password !== oldP) {
                                        throw new Error('รหัสผ่านเดิมไม่ถูกต้อง');
                                    }
                                } else {
                                    throw authErr;
                                }
                            }
                            
                            if (isAuthAccountExists) {
                                // เปลี่ยนรหัสผ่านใหม่ได้ทันที
                                await auth.currentUser.updatePassword(newP);
                            } else {
                                // ถ้าไม่เคยมีบัญชี Auth มาก่อน ให้สร้างใหม่แล้วลบรหัสเดิมทิ้ง (Auto-Migration)
                                const cred = await auth.createUserWithEmailAndPassword(email, newP); // 🌟 รับค่า cred
                                await db.collection('users').doc(user.studentId).update({
                                    hasPassword: true,
                                    firebaseUid: cred.user.uid, // 🌟 เพิ่มบรรทัดนี้
                                    password: firebase.firestore.FieldValue.delete()
                                });
                            }
                            
                            return true; 
                        } catch(e) { 
                            Swal.showValidationMessage('เกิดข้อผิดพลาด: ' + e.message); 
                            return false; 
                        }
                    }
                }).then((result) => { 
                    if (result.isConfirmed) {
                        Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'เปลี่ยนรหัสผ่านเรียบร้อยแล้ว', confirmButtonText: 'ตกลง', confirmButtonColor: '#0066FF', customClass: { popup: 'rounded-3xl' } });
                    } 
                });
            };

            const renderMenuCard = (title, subtitle, icon, color, onClick, badge) => (
                <div onClick={onClick} className="bg-white p-4 rounded-2xl shadow-sm relative overflow-hidden h-28 flex flex-col justify-between active:scale-95 transition-transform duration-200 cursor-pointer border border-gray-50 hover:border-blue-100 group">
                    <div className="flex justify-between items-start">
                        <div>
                            <h3 className="font-bold text-gray-800 text-lg leading-tight group-hover:text-[#0066FF] transition-colors">{title}</h3>

                            {badge > 0 && <span className="mt-1 inline-block bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold animate-pulse shadow-sm">{badge}</span>}
                        </div>
                    </div>
                    <div className={`absolute -bottom-3 -right-3 w-16 h-16 rounded-full opacity-20 ${color} group-hover:scale-110 transition-transform`}></div>
                    <div className={`absolute bottom-2 right-2 text-3xl ${color.replace('bg-', 'text-')}`}><i className={`fa-solid ${icon}`}></i></div>
                </div>
            );

            const renderNavItem = (id, icon, label, badge) => {
                if (!hasAccess(id)) return null; 
                return (
                    <button onClick={() => handleTabChange(id)} className={`flex-1 flex flex-col items-center justify-center py-2 transition-all duration-300 relative ${tab === id && !isSubPageOpen ? themeText : 'text-gray-400 hover:text-gray-600'}`}>
                        <div className={`text-xl mb-1 transition-transform ${tab === id && !isSubPageOpen ? '-translate-y-1' : ''}`}><i className={`fa-solid ${icon}`}></i></div>
                        <span className="text-[10px] font-bold">{label}</span>
                        {badge > 0 && <span className="absolute top-1 right-[25%] w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full animate-pulse"></span>}
                    </button>
                );
            };

           const renderHomeContent = () => {
                let statusColorClass = "border-blue-400"; 
                let statusIconBg = "bg-blue-50"; 
                let statusIconText = "text-blue-600";
                let statusTitle = "สถานะสินค้าปัจจุบัน"; 
                let statusSubtitle = ""; 
                let actionColorClass = "text-[#0066FF] bg-blue-50 hover:bg-blue-100";

                if (hasBills) {
                    statusTitle = "มีบิลค้างชำระ";
                    if (overdueCount > 0) {
                        statusColorClass = "border-red-400"; statusIconBg = "bg-red-50"; statusIconText = "text-red-500";
                        statusSubtitle = `เกินกำหนด ${overdueCount} รายการ`; actionColorClass = "text-red-600 bg-red-50 hover:bg-red-100 border border-red-100";
                    } else { statusSubtitle = `รอชำระ ${data?.bills?.length || 0} รายการ`; }
                } else if (hasActiveOrders) { 
                    statusSubtitle = `ล่าสุด: ${activeOrders[0]?.status || ''}`; 
                }

                return (
                    <div className="w-full pb-10 relative">
                       {(hasBills || hasActiveOrders) && (
                            <div className={`bg-white/95 backdrop-blur-md py-1.5 px-4 w-full mt-1 mb-1 rounded-full shadow-sm flex items-center gap-2.5 border border-gray-200 animate-[pop_0.3s_ease-out] relative z-10`}>
                                <div className={`w-7 h-7 rounded-full flex items-center justify-center ${statusIconBg} ${statusIconText} shrink-0`}>
                                   <i className="fa-solid fa-bell text-[12px] animate-ring"></i>
                                </div>
                                <div className="flex-grow flex flex-col justify-center">
                                    <div className="flex items-center gap-1.5">
                                        <h4 className="font-extrabold text-gray-800 text-[12px] leading-tight">{statusTitle}</h4>
                                        {overdueCount > 0 && <span className="relative flex h-1.5 w-1.5"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span></span>}
                                    </div>
                                    <p className={`text-[10px] font-bold mt-1.5 leading-tight ${overdueCount > 0 ? 'text-red-500' : 'text-gray-400'}`}>{statusSubtitle}</p>
                                </div>
                                <button onClick={() => { if (hasBills) handleTabChange('bills'); else if (hasActiveOrders) setTrackingOrder(activeOrders[0]); }} className={`text-[9px] font-bold px-3 py-1 rounded-full transition-all active:scale-95 shadow-sm shrink-0 flex items-center gap-1 ${actionColorClass}`}>
                                    ดูเลย <i className="fa-solid fa-chevron-right text-[7px] mt-[1px]"></i>
                                </button>
                            </div>
                        )}

                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 animate-pop pt-2 relative z-20">

                            {hasAccess('orders') && data?.orderEnabled && renderMenuCard('ร้านค้า', 'เสื้อ/ของที่ระลึก', 'fa-bag-shopping', 'bg-orange-500', () => handleTabChange('orders'), 0)}
                            {hasAccess('history') && renderMenuCard('ประวัติ', 'รายการย้อนหลัง', 'fa-clock-rotate-left', 'bg-cyan-500', () => handleTabChange('history'), 0)}

                            {hasAccess('settings') && renderMenuCard('ตั้งค่า', 'จัดการบัญชี', 'fa-gear', 'bg-gray-500', () => handleTabChange('settings'), 0)}
                        </div>

                        {hasAccess('orders') && data?.orders && data.orders.length > 0 && (

                                        else if (stat === 'รับแล้ว') statusBadgeColor = "bg-emerald-500 text-white border border-emerald-600";

                                                <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${stat === 'รับแล้ว' ? 'bg-emerald-500' : 'bg-[#0066FF]'}`}></div>

                        {data?.announcement && (

                                <p className="text-sm text-gray-500 line-clamp-2 mt-1 pr-8 leading-relaxed">คลิกเพื่อดูรายละเอียดประกาศ</p>
                                <div className="absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 group-hover:text-[#0066FF] transition-colors">
                                    <i className="fa-solid fa-chevron-right"></i>

                    </div>

            };

            const renderFinanceContent = () => {
                const fin = data?.finance || { balance: 0, income: 0, expense: 0, projects: [] };
                const safeProjects = fin.projects || [];
                const sortedProjects = financeSort === 'desc' ? [...safeProjects] : [...safeProjects].reverse();

                return (
                    <div className="space-y-6 animate-pop pb-8 pt-2">

        const App = () => {
            const [page, setPage] = useState('loading'); 
            const [user, setUser] = useState(null);
            const [dashboardData, setDashboardData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [liffUserId, setLiffUserId] = useState(null);
            const [loginProgress, setLoginProgress] = useState(null);
            const [appProgress, setAppProgress] = useState(null);
            const [maintenanceMsg, setMaintenanceMsg] = useState('ปิดปรับปรุงเซิร์ฟเวอร์');

           // 🌟 วางทับ handleLineLogin ใน App (แก้บั๊กหน้าโหลดค้างตอนย้ายหน้า)
            const handleLineLogin = async () => {
                try {
                    setLoading(true);
                    const provider = new firebase.auth.OAuthProvider('oidc.line');
                    const result = await auth.signInWithPopup(provider);
                    
                    const lineId = result.user.providerData[0].uid;
                    const lineUid = result.user.uid;

                    // หาว่าใครเป็นเจ้าของ LINE ID นี้
                    const userSnap = await db.collection('users').where('userId', '==', lineId).get();
                    
                    if (!userSnap.empty) {
                        // --- กรณีเคยผูกบัญชีไว้แล้ว ---
                        const userDoc = userSnap.docs[0];
                        const userData = userDoc.data();
                        
                        await db.collection('users').doc(userDoc.id).update({ lineUid: lineUid });

                        if(!userData.permissions) userData.permissions = ['home', 'bills', 'orders', 'history', 'finance', 'settings'];
                        localStorage.setItem('medtech_student_id', userDoc.id);
                        
                        // 🌟 1. สั่งปิดหน้าโหลดให้เสร็จก่อน
                        setLoading(false);

                        // 🌟 2. หน่วงเวลา 0.1 วินาที ให้ React เคลียร์ฉากโหลดทิ้ง แล้วค่อยพาไปหน้า Dashboard
                        setTimeout(() => {
                            setUser({ studentId: userDoc.id, ...userData, lineUid: lineUid });
                            setDashboardData({}); 
                            setPage('dashboard');
                            Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, icon: 'success', title: 'เข้าสู่ระบบผ่าน LINE สำเร็จ' });
                        }, 100);
                        
                        return; // จบการทำงานตรงนี้เลย ไม่ต้องวิ่งไป finally อีก
                        
                    } else {
                        // --- กรณี LINE นี้ยังไม่เคยผูกกับใคร ---
                        setLoading(false); // ปิดหน้าโหลดชั่วคราวให้กล่องเด้งขึ้นมาได้

                        const { value: formValues } = await Swal.fire({
                            title: 'เชื่อมต่อบัญชี LINE',
                            html: `
                                <div class="text-left mt-2">
                                    <p class="text-sm text-gray-500 mb-4 text-center">ไม่พบบัญชีที่เชื่อมต่อกับ LINE นี้<br>กรุณากรอกรหัสนักศึกษาและรหัสผ่านเพื่อผูกบัญชี</p>
                                    <input id="link-id" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none mb-3 font-bold text-gray-700 focus:ring-2 focus:ring-[#00B900] transition-all" placeholder="รหัสนักศึกษา">
                                    <input id="link-pass" type="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none font-bold text-gray-700 focus:ring-2 focus:ring-[#00B900] transition-all" placeholder="รหัสผ่าน">
                                </div>
                            `,
                            showCancelButton: true,
                            confirmButtonText: 'ยืนยันผูกบัญชี',
                            cancelButtonText: 'ยกเลิก',
                            confirmButtonColor: '#00B900',
                            customClass: { popup: 'rounded-3xl', confirmButton: 'rounded-xl font-bold px-6', cancelButton: 'rounded-xl font-bold px-6 bg-gray-100 text-gray-600' },
                            preConfirm: () => {
                                const id = document.getElementById('link-id').value;
                                const pass = document.getElementById('link-pass').value;
                                if(!id || !pass) {
                                    Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบถ้วน');
                                    return false;
                                }
                                return { id, pass };
                            }
                        });

                        if (formValues) {
                            setLoading(true);
                            try {
                                const { id: u, pass: p } = formValues;
                                const checkDoc = await db.collection('users').doc(u).get();
                                
                                if (!checkDoc.exists) {
                                    await auth.signOut();
                                    throw new Error("ไม่พบรหัสนักศึกษาในระบบ");
                                }
                                
                                const userData = checkDoc.data();
                                const email = `${u}@ptu.ac.th`;
                                
                                if (userData.hasPassword) {
                                    // โอนย้ายเข้า Firebase Auth
                                    await auth.signOut();
                                    try {
                                        await auth.signInWithEmailAndPassword(email, p);
                                        await db.collection('users').doc(u).update({ userId: lineId, lineUid: lineUid });
                                    } catch (err) {
                                        throw new Error("รหัสผ่านไม่ถูกต้อง");
                                    }
                                } else {
                                    // Migration จากรหัสผ่านเดิม
                                    if (userData.password === p) {
                                        await auth.signOut();
                                        const cred = await auth.createUserWithEmailAndPassword(email, p); // 🌟 รับค่า cred
                                        await db.collection('users').doc(u).update({ 
                                            userId: lineId, 
                                            lineUid: lineUid, 
                                            firebaseUid: cred.user.uid, // 🌟 เพิ่มบรรทัดนี้
                                            hasPassword: true, 
                                            password: firebase.firestore.FieldValue.delete()
                                        });
                                    } else {
                                        await auth.signOut();
                                        throw new Error("รหัสผ่านไม่ถูกต้อง");
                                    }
                                }

                                await auth.signOut(); 
                                setLoading(false); // 🌟 สั่งปิดโหลด
                                
                                Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'ผูกบัญชีเรียบร้อย กรุณากดเข้าสู่ระบบด้วย LINE อีกครั้ง', confirmButtonColor: '#00B900', customClass: { popup: 'rounded-3xl' } });

                            } catch (err) {
                                await auth.signOut();
                                setLoading(false); // 🌟 สั่งปิดโหลด
                                let errMsg = err.message;
                                if (errMsg.includes('auth/')) errMsg = "รหัสผ่านไม่ถูกต้อง";
                                Swal.fire({ icon: 'error', title: 'เชื่อมต่อไม่สำเร็จ', text: errMsg, customClass: { popup: 'rounded-3xl' } });
                            }
                        } else {
                            await auth.signOut(); 
                            setLoading(false); // 🌟 สั่งปิดโหลด
                        }
                    }
                } catch (error) {
                    if (error.code !== 'auth/popup-closed-by-user') {
                        fireErrorAlert('เข้าสู่ระบบไม่สำเร็จ', error.message);
                    }
                    setLoading(false); // 🌟 สั่งปิดโหลด
                }
            };

           // 🌟 วางทับ useEffect ตัวเดิมในส่วนของ const App = () => { ... }
            useEffect(() => {
                let progressInterval;
                const startLoading = () => {
                    setAppProgress(1);
                    progressInterval = setInterval(() => {
                        setAppProgress(old => Math.min(90, old + (old < 50 ? (Math.random() * 8 + 4) : (Math.random() * 2 + 1))));
                    }, 250);
                };

                const finishLoad = (nextPage) => {
                    clearInterval(progressInterval);
                    setAppProgress(100);
                    setTimeout(() => { setPage(nextPage); setAppProgress(null); }, 500);
                };

                const initializeApp = async () => {
                    startLoading();
                    try {
                        // 1. ดึงข้อมูลระบบ (เช็คปิดปรับปรุง)
                        const configDoc = await db.collection('config').doc('system').get();
                        
                        if (configDoc.exists) {
                            const sysData = configDoc.data();
                            if (sysData.maintenance === true || sysData.maintenance === 'ON') {
                                setMaintenanceMsg(sysData.maintenanceMsg || 'ปิดปรับปรุงเซิร์ฟเวอร์');
                                return finishLoad('maintenance');
                            }
                        }

                        // 2. ใช้ Firebase Auth เช็คสถานะการล็อกอิน (สำหรับคนที่ล็อกอินด้วย LINE)
                        auth.onAuthStateChanged(async (firebaseUser) => {
                            if (firebaseUser) {
                                // ถ้าเคยล็อกอินผ่าน LINE ไว้ ให้หาว่า UID นี้ตรงกับนักศึกษาคนไหน
                                const lineUid = firebaseUser.providerData[0]?.uid || firebaseUser.uid;
                                const userSnap = await db.collection('users').where('userId', '==', lineUid).get();
                                
                                if (!userSnap.empty) {
                                    const userDoc = userSnap.docs[0];
                                    const userData = userDoc.data();
                                    
                                    if(!userData.permissions) userData.permissions = ['home', 'bills', 'orders', 'history', 'finance', 'settings'];
                                    
                                    localStorage.setItem('medtech_student_id', userDoc.id); // ซิงค์กับระบบเดิม
                                    setUser({ studentId: userDoc.id, ...userData });
                                    setDashboardData({}); 
                                    return finishLoad('dashboard');
                                }
                            }
                            
                            // 3. ตรวจสอบการล็อกอินด้วยรหัสผ่าน (Local Storage แบบเดิม)
                            const savedStudentId = localStorage.getItem('medtech_student_id');
                            if (savedStudentId) {
                                const userDoc = await db.collection('users').doc(savedStudentId).get();
                                if (userDoc.exists) {
                                    const userData = userDoc.data();
                                    if(!userData.permissions) userData.permissions = ['home', 'bills', 'orders', 'history', 'finance', 'settings'];
                                    
                                    setUser({ studentId: savedStudentId, ...userData });
                                    setDashboardData({}); 
                                    return finishLoad('dashboard');
                                } else {
                                    // ถ้ารหัสนักศึกษาไม่มีในระบบแล้ว ให้ลบข้อมูลเครื่องทิ้ง
                                    localStorage.removeItem('medtech_student_id');
                                }
                            }
                            
                            // ถ้าไม่เจอทั้งการล็อกอินด้วย LINE และ รหัสผ่าน ให้พาไปหน้า Login
                            finishLoad('login');
                        });

                    } catch (e) { 
                        console.error("Initialize Error:", e);
                        finishLoad('login'); 
                    }
                };

                initializeApp();
            }, []);

           // 🌟 วางทับ handleLogin ใน App (ฉบับแก้บั๊กค้างเติ่ง + ซ่อมแซมตัวเอง)
            const handleLogin = async (u, p) => {
                if(!u || !p) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
                setLoginProgress(1);
                const progressInterval = setInterval(() => setLoginProgress(old => Math.min(90, old + 10)), 250);

                try {
                    const email = `${u}@ptu.ac.th`; 
                    let userCred;
                    let needsMigration = false;
                    
                    try {
                        // 1. ลองล็อกอินผ่าน Firebase Auth ก่อน
                        userCred = await auth.signInWithEmailAndPassword(email, p);
                    } catch (authError) {
                        // 2. ถ้าเข้าไม่ได้ ให้เช็คว่าเป็นผู้ใช้เก่าที่ต้องย้ายข้อมูล (Migration) หรือไม่
                        if (authError.code === 'auth/user-not-found' || authError.code === 'auth/invalid-credential' || authError.code === 'auth/invalid-login-credentials') {
                            const userDoc = await db.collection('users').doc(u).get();
                            
                            // เช็คว่ารหัสผ่านเดิมในฐานข้อมูลตรงกันไหม
                            if (userDoc.exists && userDoc.data().password === p) {
                                needsMigration = true;
                                try {
                                    // 2.1 สร้างบัญชี Auth ให้ใหม่
                                    userCred = await auth.createUserWithEmailAndPassword(email, p);
                                } catch (createErr) {
                                    // 🌟 ดักจับกรณีสร้างใน Auth ไปแล้วแต่ Firestore ค้างเติ่ง (เน็ตหลุด/กดเบิ้ล)
                                    if (createErr.code === 'auth/email-already-in-use') {
                                        userCred = await auth.signInWithEmailAndPassword(email, p);
                                    } else {
                                        throw createErr;
                                    }
                                }
                            } else {
                                throw new Error('auth/wrong-password'); // รหัสเก่าก็ไม่ถูก เตะออกเลย
                            }
                        } else {
                            throw authError;
                        }
                    }

                    // 🌟 3. บังคับอัปเดต Firestore (สำหรับคนที่เพิ่งย้าย หรือคนที่ค้างจากการสร้างรอบที่แล้ว)
                    if (userCred) {
                        const checkDoc = await db.collection('users').doc(u).get();
                        // ถ้า firebaseUid ยังไม่ถูกบันทึก ให้จัดการอัปเดตให้เรียบร้อย
                        if (checkDoc.exists && !checkDoc.data().firebaseUid) {
                            await db.collection('users').doc(u).update({ 
                                hasPassword: true,
                                firebaseUid: userCred.user.uid,
                                password: firebase.firestore.FieldValue.delete() 
                            });
                        }
                    }

                    // 4. เมื่อเคลียร์ทุกอย่างเสร็จสมบูรณ์ ดึงข้อมูลโปรไฟล์จาก Firestore มาเปิดหน้าเว็บ
                    const finalUserDoc = await db.collection('users').doc(u).get();
                    const userData = finalUserDoc.data();

                    clearInterval(progressInterval);
                    setLoginProgress(100); 

                    if(!userData.permissions) userData.permissions = ['home', 'bills', 'orders', 'history', 'finance', 'settings'];
                    localStorage.setItem('medtech_student_id', u);

                    setTimeout(() => {
                        setUser({ studentId: u, ...userData }); 
                        setDashboardData({}); 
                        setPage('dashboard');
                        setLoginProgress(null);
                        if (!liffUserId) {
                            Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, icon: 'success', title: `ยินดีต้อนรับ คุณ${userData.name}` });
                        }
                    }, 600);

                } catch(e) { 
                    clearInterval(progressInterval);
                    setLoginProgress(null);
                    let errMsg = e.message;
                    if(errMsg.includes('auth/')) errMsg = 'รหัสนักศึกษาหรือรหัสผ่านไม่ถูกต้อง';
                    Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: errMsg, customClass: { popup: 'rounded-3xl' } }); 
                }
            };
            
            const handleRegisterSuccess = (u) => { setPage('login'); };

            // 🌟 วางทับ handleLogout ตัวเดิม (สลับลำดับการทำงานเพื่อแก้บั๊กเด้งกลับ)
            const handleLogout = async () => {
                // 1. เคลียร์ Local Storage ทิ้งก่อนเป็นอันดับแรกเลย! ระบบจะได้ไม่เผลอดึงกลับเข้ามา
                localStorage.removeItem('medtech_student_id');
                
                // 2. สั่ง Firebase Auth ให้ล็อกเอาท์
                try {
                    await auth.signOut(); 
                } catch (e) {
                    console.error("Logout Error:", e);
                }

                // 3. รีเซ็ต State เพื่อพากลับไปหน้า Login
                setUser(null); 
                setDashboardData(null);
                setPage('login'); 
            };

            return (
                <div>
                    {loginProgress !== null && <Loading text="กำลังเข้าสู่ระบบ..." progress={loginProgress} />}
                    {page === 'loading' && <Loading text="กำลังโหลดระบบ..." progress={appProgress} />} 
                    {page === 'login' && <Login onLogin={handleLogin} onRegister={() => setPage('register')} onLineLogin={handleLineLogin} />}
                    {page === 'register' && <Register onBack={() => setPage('login')} onRegisterSuccess={handleRegisterSuccess} />}
                    {page === 'dashboard' && user && (
                    <Dashboard 
                        user={user} 
                        setUser={setUser} // 🌟 เพิ่มบรรทัดนี้ลงไป 🌟
                        initialData={dashboardData} 
                        onLogout={handleLogout} 
                    />
                )}
                    {page === 'maintenance' && <MaintenanceMode message={maintenanceMsg} onBypass={() => setPage('login')} />}
                    {loading && <Loading />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
