<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MedTech 67 Finance System</title>

    <link rel="icon" type="image/png" href="./images/MEDTECH67.png?v=1">
    <link rel="apple-touch-icon" href="./images/MEDTECH67.png?v=1">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html, body, #root {
            width: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            overscroll-behavior-y: none;
        }
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #F0F4F8;
            color: #1F2937;
            -webkit-tap-highlight-color: transparent; 
        }

        @media screen and (max-width: 768px) {
            input, select, textarea {
            font-size: 16px !important; 
          }
        }

        @keyframes slideInRight {
            0% { transform: translateX(100%); opacity: 0.5; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1) forwards; }

        @keyframes blink-border {
            0%, 100% { border-color: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { border-color: #fee2e2; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2); }
        }
        .overdue-card { animation: blink-border 2s infinite; border-width: 2px !important; z-index: 10; }
        
        .animate-marquee { animation: marquee 2s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .loader { border: 4px solid #e0f2fe; border-top: 4px solid #2563eb; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html { scroll-behavior: smooth; }

        @keyframes border-flow {
            0% { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
            50% { border-color: #2563eb; box-shadow: 0 0 25px rgba(37, 99, 235, 0.8); }
            100% { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        }
        .popup-timer-border { border: 3px solid transparent; animation: border-flow 1.5s infinite; border-radius: 1.5rem !important; }

        .loading-text:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }

        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(20px) rotate(360deg); opacity: 0; }
        }
        .falling-item {
            position: fixed; top: -10%; z-index: -1; user-select: none; pointer-events: none;
            animation-name: fall; animation-timing-function: linear; animation-iteration-count: infinite;
        }

        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.25rem); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0.5rem); }

        @keyframes slideDownDrawer {
            0% { transform: translateY(-50%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .animate-drawer { animation: slideDownDrawer 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }

        @keyframes ring {
            0% { transform: rotate(0); }
            5% { transform: rotate(15deg); }
            10% { transform: rotate(-10deg); }
            15% { transform: rotate(5deg); }
            20% { transform: rotate(-5deg); }
            25% { transform: rotate(0); }
            100% { transform: rotate(0); }
        }
        .animate-ring {
            animation: ring 2s ease-in-out infinite;
            transform-origin: top center;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbzEXjfZSgs3riQmjc22AZu45dn50etSm_lMqkior3UmHa8M84mwW_7qoqXCl2N3XX--sw/exec";

        const runGoogleScript = async (funcName, args = []) => {
            try {
                const formData = new URLSearchParams();
                formData.append('data', JSON.stringify({ action: funcName, args: args }));

                const response = await fetch(API_URL, { method: 'POST', body: formData });
                const result = await response.json();
                if (result.error) throw new Error(result.error);
                return result;
            } catch (error) {
                console.error(`[API Error] ${funcName}:`, error);
                throw error;
            }
        };

        const formatCurrency = (val) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(val);
        
        const getDirectDriveUrl = (url) => {
            if (!url) return "https://via.placeholder.com/400x300?text=No+Image";
            if (url.indexOf("lh3.googleusercontent.com") !== -1 || url.indexOf("googleusercontent.com/profile") !== -1) return url;
            try {
                var id = "";
                if (url.indexOf("file/d/") !== -1) id = url.split("file/d/")[1].split("/")[0];
                else if (url.indexOf("id=") !== -1) id = url.split("id=")[1].split("&")[0];
                if (id) return "https://lh3.googleusercontent.com/d/" + id;
                return url; 
            } catch (e) {
                return "https://via.placeholder.com/400x300?text=Error";
            }
        };

        const fireAutoCloseAlert = (title, text) => {
            return Swal.fire({
                title: title, html: `<p class="text-gray-600 text-lg">${text}</p>`, icon: 'success',
                showConfirmButton: true, confirmButtonText: 'ตกลง', confirmButtonColor: '#0066FF', allowOutsideClick: false,
                customClass: { popup: 'rounded-3xl pb-8 pt-6', title: 'text-2xl font-bold text-gray-800', confirmButton: 'rounded-xl px-10 py-3 font-bold shadow-lg text-base hover:scale-105 transition-transform' }
            });
        };

        const fireErrorAlert = (title, text) => {
            return Swal.fire({
                title: title, html: `<div class="px-2"><p class="text-gray-600">${text}</p></div>`, icon: 'error',
                showConfirmButton: true, confirmButtonText: 'ปิด', confirmButtonColor: '#EF4444',
                customClass: { popup: 'rounded-3xl pb-6', title: 'text-xl font-bold text-red-600', confirmButton: 'rounded-xl px-8 py-2.5 font-bold shadow-md text-sm' }
            });
        };

        const fireOrderSuccessAlert = (orderId) => {
            const qrUrl = `https://quickchart.io/qr?text=${orderId}&size=200`;
            return Swal.fire({
                title: 'สั่งซื้อสำเร็จ!',
                html: `
                    <div class="flex flex-col items-center">
                        <div class="bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-sm font-bold mb-4 border border-blue-100">บันทึกข้อมูลแล้ว</div>
                        <div class="bg-white p-2 border rounded-xl shadow-sm mb-2"><img src="${qrUrl}" class="w-32 h-32 rounded-lg" alt="Order QR" /></div>
                        <p class="text-xs text-gray-400 mb-2">Order ID</p>
                        <p class="text-xl font-mono font-bold text-[#0066FF] bg-blue-50 px-4 py-1 rounded-lg border border-blue-100 tracking-wider mb-4">${orderId}</p>
                        <div class="text-sm text-gray-500 bg-gray-50 p-3 rounded-xl w-full text-center border border-gray-100">
                            <i class="fa-solid fa-clock-rotate-left mr-1"></i> ตรวจสอบสถานะได้ที่เมนู<br><span class="text-gray-800 font-bold">"ประวัติการสั่งซื้อ"</span>
                        </div>
                    </div>
                `,
                icon: 'success', showConfirmButton: true, confirmButtonText: 'ตกลง', confirmButtonColor: '#0066FF', allowOutsideClick: false,
                customClass: { popup: 'rounded-3xl pb-6', title: 'text-2xl font-bold text-gray-800', confirmButton: 'rounded-xl px-10 py-3 font-bold shadow-lg text-base mt-2' }
            });
        };

        const Loading = () => ReactDOM.createPortal(
            <div className="fixed inset-0 bg-black/60 z-[9999] flex items-center justify-center backdrop-blur-sm">
                <div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center animate-bounce">
                    <div className="loader mb-3"></div>
                    <p className="text-[#0066FF] font-bold">กำลังประมวลผล...</p>
                </div>
            </div>, document.body
        );

        const ProgressLoading = ({ progress }) => ReactDOM.createPortal(
            <div className="fixed inset-0 bg-black/80 z-[9999] flex items-center justify-center backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
                <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm flex flex-col items-center relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 via-blue-600 to-blue-400 animate-marquee"></div>
                    <div className="relative w-24 h-24 flex items-center justify-center mb-4">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#e5e7eb" strokeWidth="8" />
                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#0066FF" strokeWidth="8" strokeDasharray="251.2" strokeDashoffset={251.2 - (251.2 * progress) / 100} strokeLinecap="round" className="transition-all duration-300 ease-out" />
                        </svg>
                        <span className="absolute text-2xl font-bold text-[#0066FF]">{progress}%</span>
                    </div>
                    <h3 className="text-lg font-bold text-gray-800 mb-1 loading-text">กำลังตรวจสอบสลีป</h3>
                    <p className="text-xs text-gray-500">ระบบกำลังตรวจอัตโนมัติ</p>
                </div>
            </div>, document.body
        );

        const SlipModal = ({ url, onClose }) => {
            const [imgSrc, setImgSrc] = useState(null);
            useEffect(() => { setImgSrc(getDirectDriveUrl(url)); }, [url]);
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[9999] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-4 animate-[fadeIn_0.2s_ease-out]" onClick={onClose}>
                    <button onClick={onClose} className="absolute top-6 right-6 text-white bg-white/20 hover:bg-white/40 rounded-full w-12 h-12 flex items-center justify-center backdrop-blur-md transition active:scale-90 z-50">
                        <i className="fa-solid fa-xmark text-2xl"></i>
                    </button>
                    <div className="relative w-full max-w-md max-h-[75vh] flex items-center justify-center">
                        <img src={imgSrc} className="max-w-full max-h-full object-contain rounded-lg animate-[pop_0.3s_ease-out] drop-shadow-2xl" alt="Slip" onClick={e => e.stopPropagation()} onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/400x500?text=Image+Load+Error'; }} />
                    </div>
                    <a href={url} target="_blank" onClick={e => e.stopPropagation()} className="mt-8 bg-white/20 hover:bg-white/30 text-white font-bold py-3.5 px-8 rounded-full backdrop-blur-md transition flex items-center justify-center gap-2 text-sm shadow-lg border border-white/20 active:scale-95 animate-[slideDownDrawer_0.4s_ease-out]">
                        <i className="fa-solid fa-up-right-from-square"></i> เปิดดูรูปภาพต้นฉบับ
                    </a>
                </div>, document.body
            );
        };

        const AnnouncementModal = ({ text, onClose }) => {
            const isUrl = (string) => {
                if (!string || typeof string !== 'string') return false;
                const cleanStr = string.trim().toLowerCase();
                return cleanStr.startsWith('http') && !cleanStr.includes(' ');
            };
            const textIsUrl = isUrl(text);

            if (textIsUrl) {
                return ReactDOM.createPortal(
                    <div className="fixed inset-0 z-[9999] bg-black/90 backdrop-blur-md flex flex-col items-center justify-center p-4 animate-[fadeIn_0.2s_ease-out]" onClick={onClose}>
                        <div className="relative w-full max-w-md max-h-[75vh] flex items-center justify-center mb-6">
                            <img src={getDirectDriveUrl(text)} className="max-w-full max-h-full object-contain rounded-2xl animate-[pop_0.3s_ease-out] drop-shadow-2xl" alt="Announcement" onClick={e => e.stopPropagation()} onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/400x500?text=Link+Load+Error'; }} />
                        </div>
                        <button onClick={onClose} className="bg-white/20 hover:bg-white/30 text-white font-bold py-3.5 px-8 rounded-full backdrop-blur-md transition flex items-center justify-center gap-2 text-sm shadow-lg border border-white/20 active:scale-95 animate-[slideDownDrawer_0.4s_ease-out]">
                            <i className="fa-solid fa-xmark"></i> ปิดหน้าต่าง
                        </button>
                    </div>, document.body
                );
            }

            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[9999] bg-black/50 backdrop-blur-sm flex items-center justify-center p-5 animate-[fadeIn_0.2s_ease-out]" onClick={onClose}>
                    <div className="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden animate-[pop_0.3s_ease-out] border border-gray-100 p-6 relative" onClick={e => e.stopPropagation()}>
                        <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50/60 rounded-bl-full -z-10"></div>
                        <div className="flex items-center gap-4 mb-5">
                            <div className="w-14 h-14 bg-blue-50 text-[#0066FF] rounded-2xl flex items-center justify-center shadow-inner shrink-0">
                                <i className="fa-solid fa-bell text-2xl animate-ring"></i>
                            </div>
                            <div>
                                <h2 className="text-xl font-extrabold text-gray-800 tracking-tight leading-tight">ประกาศแจ้งเตือน</h2>
                                <p className="text-[10px] text-[#0066FF] font-bold uppercase tracking-wider mt-0.5">Announcement</p>
                            </div>
                        </div>
                        <div className="max-h-[50vh] overflow-y-auto no-scrollbar mb-6 bg-gray-50/50 p-4 rounded-2xl border border-gray-100/50">
                            <p className="text-gray-600 leading-relaxed whitespace-pre-wrap font-medium text-sm">{text}</p>
                        </div>
                        <button onClick={onClose} className="w-full bg-gray-50 hover:bg-gray-100 text-gray-700 font-bold py-3.5 rounded-xl transition-transform active:scale-95 text-base flex justify-center items-center gap-2 border border-gray-200 shadow-sm">
                            รับทราบ <i className="fa-solid fa-check text-green-500 ml-1"></i>
                        </button>
                    </div>
                </div>, document.body
            );
        };

        const Login = ({ onLogin, onRegister, onLineLogin }) => {
            const [id, setId] = useState('');
            const [pass, setPass] = useState('');

            return (
                <div className="h-full w-full flex items-center justify-center p-5 bg-[#F0F4F8] md:bg-gray-200 relative overflow-y-auto">
                    <div className="w-full max-w-sm md:max-w-4xl bg-[#F0F4F8] md:bg-white md:shadow-2xl md:rounded-[3rem] relative z-10 flex flex-col md:flex-row overflow-hidden md:border-8 border-white/60 md:min-h-[600px] my-auto">
                        
                        <div className="hidden md:flex md:w-1/2 bg-[#0066FF] p-10 flex-col items-center justify-center text-white relative overflow-hidden">
                            <div className="absolute inset-0 bg-blue-600/20 backdrop-blur-3xl z-0"></div>
                            <img src={getDirectDriveUrl('https://drive.google.com/file/d/1xUmu5w6937s_xEeuxttKeqIOShPbP8_P/view?usp=drivesdk')} className="w-48 h-48 object-cover rounded-full z-10 shadow-2xl mb-6 border-4 border-white/20" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150?text=Logo'; }} />
                            <h2 className="text-3xl font-black z-10 tracking-tight text-center leading-tight whitespace-nowrap">MedTech 67</h2>
                            <p className="text-blue-100 z-10 mt-2 font-bold text-base tracking-wider">Finance System</p>
                            <div className="absolute top-[-10%] left-[-10%] w-72 h-72 bg-white/10 rounded-full blur-3xl"></div>
                            <div className="absolute bottom-[-10%] right-[-10%] w-72 h-72 bg-black/10 rounded-full blur-3xl"></div>
                        </div>

                        <div className="w-full md:w-1/2 flex flex-col justify-center p-2 md:p-12 relative">
                            <div className="md:hidden text-center mb-2">
                                <div className="relative inline-block">
                                    <div className="absolute inset-0 bg-blue-400 rounded-full blur-2xl opacity-20 animate-pulse"></div>
                                    <div className="relative w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-[0_10px_40px_-10px_rgba(0,102,255,0.3)] border-4 border-white overflow-hidden z-10">
                                        <img src={getDirectDriveUrl('https://drive.google.com/file/d/1xUmu5w6937s_xEeuxttKeqIOShPbP8_P/view?usp=drivesdk')} alt="Logo" className="w-full h-full object-cover rounded-full transform transition-transform scale-150" onError={(e) => { e.target.src = 'https://via.placeholder.com/150'; }} />
                                    </div>
                                </div>
                                <h1 className="text-xl font-black text-gray-800 tracking-tight mt-4 whitespace-nowrap">ระบบชำระเงินชั้นปีที่ 3</h1>
                                <p className="text-[#0066FF] mt-0.5 font-extrabold text-xs tracking-wide">MedTech 67 Payment System</p>
                            </div>

                            <div className="bg-white/80 md:bg-transparent backdrop-blur-xl p-6 md:p-0 rounded-[2rem] md:rounded-none shadow-xl md:shadow-none shadow-blue-900/5 border border-white md:border-none mt-2">
                                <div className="space-y-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] md:text-xs font-bold text-gray-500 ml-1 uppercase tracking-wider">รหัสนักศึกษา</label>
                                        <div className="relative group">
                                            <span className="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-[#0066FF] transition-colors"><i className="fa-solid fa-user-graduate"></i></span>
                                            <input type="text" value={id} onChange={e => setId(e.target.value)} className="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#0066FF] outline-none transition-all font-bold text-gray-700 shadow-sm text-sm" placeholder="67XXXXXXXX" />
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[11px] md:text-xs font-bold text-gray-500 ml-1 uppercase tracking-wider">รหัสผ่าน</label>
                                        <div className="relative group">
                                            <span className="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-[#0066FF] transition-colors"><i className="fa-solid fa-lock"></i></span>
                                            <input type="password" value={pass} onChange={e => setPass(e.target.value)} className="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#0066FF] outline-none transition-all font-bold text-gray-700 shadow-sm text-sm" placeholder="••••••••" />
                                        </div>
                                    </div>
                                    <button onClick={() => onLogin(id, pass)} className="w-full bg-[#0066FF] hover:bg-blue-700 text-white font-bold py-3.5 md:py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all transform active:scale-[0.98] mt-4 text-base">เข้าสู่ระบบด้วยรหัสผ่าน</button>
                                    
                                    <div className="flex flex-col items-center justify-center px-1 pt-5 gap-3">
                                        <div className="flex items-center gap-2 w-full justify-center opacity-40 mb-1">
                                            <div className="h-px bg-gray-400 w-full"></div>
                                            <span className="text-[10px] uppercase font-bold tracking-widest text-gray-600 whitespace-nowrap">หรือ</span>
                                            <div className="h-px bg-gray-400 w-full"></div>
                                        </div>
                                        
                                        <button onClick={onLineLogin} className="w-full bg-[#00B900] hover:bg-[#009900] text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-[#00B900]/20 transition-all transform active:scale-[0.98] flex justify-center items-center gap-2 text-sm">
                                            <i className="fa-brands fa-line text-xl"></i> เข้าสู่ระบบผ่าน LINE
                                        </button>
                                    
                                        <div className="flex justify-between w-full px-2 mt-2">
                                            <button onClick={onRegister} className="text-xs font-bold text-gray-500 hover:text-[#0066FF] transition-colors">
                                                <i className="fa-solid fa-key mr-1"></i> ลืมรหัส / สร้างรหัส
                                            </button>
                                            <button onClick={() => Swal.fire({
                                                title:'ขอความช่วยเหลือ', 
                                                html:'<p class="text-sm text-gray-600 mb-4 font-medium">หากพบปัญหาการเข้าใช้งาน<br>โปรดติดต่อฝ่ายการเงินผ่าน LINE</p><a href="https://lin.ee/10OG1hK" target="_blank" class="bg-[#00B900] text-white px-6 py-3 rounded-xl inline-block font-bold shadow-sm shadow-[#00B900]/20 active:scale-95 transition-transform no-underline"><i class="fa-brands fa-line mr-1 text-lg"></i> ติดต่อแอดมิน</a>', 
                                                showConfirmButton:false, showCloseButton:true, 
                                                customClass:{popup:'rounded-3xl pb-8', title: 'text-xl font-extrabold text-gray-800 pt-2', closeButton: 'focus:outline-none hover:text-red-500 transition-colors'}
                                            })} className="text-xs font-bold text-gray-500 hover:text-orange-500 transition-colors">
                                                <i className="fa-solid fa-headset mr-1"></i> ติดต่อแอดมิน
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-8 md:mt-12 text-center pb-4">
                                <p className="text-gray-400 text-[10px] font-medium">© 2026 Finance MedTechptu 67. All rights reserved.</p>
                                <p className="text-gray-400 text-[10px] font-medium">🖥️ Develop by CHOKUN</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Register = ({ onBack, onRegisterSuccess }) => {
            const [step, setStep] = useState(1);
            const [studentId, setStudentId] = useState('');
            const [studentInfo, setStudentInfo] = useState(null);
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [loading, setLoading] = useState(false);

            const handleVerify = async () => {
                if (!studentId) return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสนักศึกษา', 'warning');
                setLoading(true);
                try {
                    const res = await runGoogleScript('verifyStudentId', [studentId]);
                    if (res.found) { setStudentInfo(res); setStep(2); } 
                    else { Swal.fire('ข้อผิดพลาด', res.message || 'ไม่พบข้อมูลในระบบ', 'error'); }
                } catch (e) { Swal.fire('Error', e.toString(), 'error'); }
                setLoading(false);
            };

            const handleSetPassword = async () => {
                if (!newPass || !confirmPass) return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสผ่านให้ครบ', 'warning');
                if (newPass.length < 6) return Swal.fire('แจ้งเตือน', 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'warning');
                if (newPass !== confirmPass) return Swal.fire('แจ้งเตือน', 'รหัสผ่านไม่ตรงกัน', 'warning');
                setLoading(true);
                try {
                    const res = await runGoogleScript('setNewPassword', [studentId, newPass]);
                    if (res.success) { Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'สร้างรหัสผ่านเรียบร้อยแล้ว', confirmButtonColor: '#0066FF', customClass: { popup: 'rounded-3xl' } }).then(() => onRegisterSuccess()); } 
                    else { Swal.fire({ icon: 'error', title: 'ข้อผิดพลาด', text: res.message, customClass: { popup: 'rounded-3xl' } }); }
                } catch (e) { Swal.fire('Error', e.toString(), 'error'); }
                setLoading(false);
            };

            const handleRecovery = async () => {
                setLoading(true);
                try {
                    const res = await runGoogleScript('sendRecoveryMessage', [studentId]);
                    if (res.success) { Swal.fire({ icon: 'success', title: 'สำเร็จ', text: res.message, confirmButtonColor: '#00B900', customClass: { popup: 'rounded-3xl' } }).then(() => onBack()); } 
                    else { Swal.fire({ icon: 'error', title: 'ข้อผิดพลาด', text: res.message, customClass: { popup: 'rounded-3xl' } }); }
                } catch (e) { Swal.fire('Error', e.toString(), 'error'); }
                setLoading(false);
            };

            return (
                <div className="h-full w-full flex items-center justify-center p-5 bg-[#F0F4F8] md:bg-gray-200 relative overflow-y-auto">
                    <div className="w-full max-w-sm md:max-w-4xl bg-[#F0F4F8] md:bg-white md:shadow-2xl md:rounded-[3rem] relative z-10 flex flex-col md:flex-row overflow-hidden md:border-8 border-white/60 md:min-h-[600px] my-auto">
                        
                        <div className="hidden md:flex md:w-1/2 bg-[#0066FF] p-10 flex-col items-center justify-center text-white relative overflow-hidden">
                            <div className="absolute inset-0 bg-blue-600/20 backdrop-blur-3xl z-0"></div>
                            <img src={getDirectDriveUrl('https://drive.google.com/file/d/1LYD0PNwnadNKfuNgY8KokVw7Ngs5-X9R/view?usp=drivesdk')} className="w-48 h-48 object-cover rounded-full z-10 shadow-2xl mb-6 border-4 border-white/20" />
                            <h2 className="text-3xl font-black z-10 tracking-tight text-center leading-tight whitespace-nowrap">ตรวจสอบข้อมูล</h2>
                            <p className="text-blue-100 z-10 mt-2 font-bold text-base tracking-wider">MedTech 67 Finance System</p>
                        </div>

                        <div className="w-full md:w-1/2 flex flex-col justify-center p-2 md:p-12 relative">
                            <div className="md:hidden text-center mb-6">
                                <div className="relative inline-block">
                                    <div className="absolute inset-0 bg-blue-400 rounded-full blur-2xl opacity-20 animate-pulse"></div>
                                    <div className="relative w-28 h-28 bg-white rounded-full flex items-center justify-center shadow-[0_10px_40px_-10px_rgba(0,102,255,0.3)] border-4 border-white overflow-hidden z-10">
                                        <img src={getDirectDriveUrl('https://drive.google.com/file/d/1LYD0PNwnadNKfuNgY8KokVw7Ngs5-X9R/view?usp=drivesdk')} className="w-full h-full object-cover rounded-full" />
                                    </div>
                                </div>
                                <h1 className="text-xl font-black text-gray-800 tracking-tight mt-5 whitespace-nowrap">ตรวจสอบข้อมูล</h1>
                                <p className="text-[#0066FF] mt-1 font-extrabold text-xs tracking-wide">MedTech 67 Finance System</p>
                            </div>

                            <div className="bg-white/80 md:bg-transparent backdrop-blur-xl p-6 md:p-0 rounded-[2.5rem] md:rounded-none shadow-xl md:shadow-none shadow-blue-900/5 border border-white md:border-none">
                                {step === 1 && (
                                    <div className="space-y-5 animate-[fadeIn_0.3s_ease-out]">
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-gray-500 ml-1 uppercase tracking-wider">ตรวจสอบข้อมูล</label>
                                            <div className="relative group">
                                                <span className="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-[#0066FF] transition-colors"><i className="fa-solid fa-id-card"></i></span>
                                                <input type="text" value={studentId} onChange={e => setStudentId(e.target.value)} className="w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#0066FF] outline-none font-bold text-gray-700 shadow-sm text-sm" placeholder="67XXXXXXXX" />
                                            </div>
                                        </div>
                                        <button onClick={handleVerify} disabled={loading} className="w-full bg-[#0066FF] hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98] mt-4 flex justify-center items-center text-lg">{loading ? <div className="loader w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : 'ตรวจสอบข้อมูล'}</button>
                                    </div>
                                )}
                                {step === 2 && studentInfo && (
                                    <div className="space-y-5 animate-[fadeIn_0.3s_ease-out]">
                                        <div className="bg-blue-50/50 border border-blue-100 p-4 rounded-2xl text-center mb-4">
                                            <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto mb-2 shadow-sm text-blue-500"><i className="fa-solid fa-user-check text-xl"></i></div>
                                            <p className="text-sm text-gray-500 font-bold mb-1">ยินดีต้อนรับ</p>
                                            <h3 className="font-bold text-gray-800 text-lg leading-tight">{studentInfo.name}</h3>
                                        </div>
                                        {studentInfo.hasPassword ? (
                                            <div className="text-center space-y-4">
                                                <div className="bg-yellow-50 text-yellow-700 p-4 rounded-xl text-sm font-bold border border-yellow-100"><i className="fa-solid fa-circle-exclamation mr-2"></i>คุณมีรหัสผ่านในระบบแล้ว</div>
                                                <p className="text-sm text-gray-500 font-medium px-2">หากจำไม่ได้ สามารถให้ระบบส่งรหัสผ่านเดิมไปที่แอป LINE ของคุณได้ และสามารถเปลี่ยนได้ในตั้งค่าหรือติดต่อแอดมมิน</p>
                                                <button onClick={handleRecovery} disabled={loading} className="w-full bg-[#00B900] hover:bg-[#009900] text-white font-bold py-3.5 rounded-2xl shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 mt-2">
                                                    {loading ? <div className="loader w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <><i className="fa-brands fa-line text-xl"></i> ส่งรหัสผ่านไปที่ LINE</>}
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="space-y-4">
                                                <div className="bg-green-50 text-green-700 p-3 rounded-xl text-xs font-bold text-center border border-green-100 mb-2"><i className="fa-solid fa-unlock-keyhole mr-1.5"></i>กรุณาตั้งรหัสผ่านใหม่เพื่อเข้าใช้งาน</div>
                                                <div className="space-y-2"><div className="relative group"><span className="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-[#0066FF]"><i className="fa-solid fa-key"></i></span><input type="password" value={newPass} onChange={e => setNewPass(e.target.value)} className="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#0066FF] outline-none font-bold text-gray-700 text-sm" placeholder="รหัสผ่านใหม่ (อย่างน้อย 6 ตัว)" /></div></div>
                                                <div className="space-y-2"><div className="relative group"><span className="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-[#0066FF]"><i className="fa-solid fa-check-double"></i></span><input type="password" value={confirmPass} onChange={e => setConfirmPass(e.target.value)} className="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-[#0066FF] outline-none font-bold text-gray-700 text-sm" placeholder="ยืนยันรหัสผ่านใหม่" /></div></div>
                                                <button onClick={handleSetPassword} disabled={loading} className="w-full bg-[#0066FF] hover:bg-blue-700 text-white font-bold py-3.5 rounded-2xl shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 mt-2">
                                                    {loading ? <div className="loader w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : 'บันทึกรหัสผ่าน'}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                            <div className="mt-8 text-center pb-4">
                                <button onClick={onBack} className="text-sm font-bold text-gray-500 hover:text-[#0066FF] transition-colors flex items-center justify-center mx-auto gap-2 bg-white/50 md:bg-gray-50 px-4 py-2 rounded-full border border-white md:border-gray-200 hover:bg-white shadow-sm">
                                    <i className="fa-solid fa-arrow-left"></i> กลับไปหน้าเข้าสู่ระบบ
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const BillTimer = ({ dueDate }) => {
            const [timeLeft, setTimeLeft] = useState(null);
            const [progressPercent, setProgressPercent] = useState(100);

            useEffect(() => {
                const calculateTime = () => {
                    if (!dueDate) return;
                    const parts = dueDate.split('/');
                    const target = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                    target.setHours(23, 59, 59); 
                    const now = new Date();
                    const diff = target - now;

                    if (diff <= 0) { setTimeLeft(null); return; }

                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    setTimeLeft({ days, hours, minutes, seconds });

                    const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
                    let pct = (diff / THIRTY_DAYS_MS) * 100;
                    if (pct > 100) pct = 100;
                    if (pct < 0) pct = 0;
                    setProgressPercent(pct);
                };

                calculateTime();
                const timer = setInterval(calculateTime, 1000);
                return () => clearInterval(timer);
            }, [dueDate]);

            if (!timeLeft) return null;

            const { days, hours, minutes, seconds } = timeLeft;
            let label = ""; let unit = "";
            let color = "#10B981"; let bgColor = "#ECFDF5"; 
            let isUrgent = false;

            if (days > 0) {
                label = days; unit = "วัน";
                if (days <= 3) { color = "#d97706"; bgColor = "#FFFBEB"; } 
                else { color = "#059669"; bgColor = "#ECFDF5"; }
            } else if (hours > 0) {
                label = hours; unit = "ชม."; color = "#EA580C"; bgColor = "#FFF7ED"; isUrgent = true; 
            } else {
                label = `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`; unit = ""; 
                color = "#DC2626"; bgColor = "#FEF2F2"; isUrgent = true; 
            }
            
            return (
                <div className={`relative flex items-center justify-center w-12 h-12 ml-3 rounded-xl shadow-sm flex-shrink-0 transition-colors duration-300 ${isUrgent ? 'animate-pulse border-red-200' : 'border-gray-100'}`} style={{ backgroundColor: bgColor }}>
                    <svg className="absolute top-0 left-0 w-full h-full transform -rotate-90 rounded-xl overflow-visible" width="48" height="48">
                        <rect x="1.5" y="1.5" width="45" height="45" rx="10" ry="10" fill="transparent" stroke={color} strokeWidth="3" strokeOpacity="0.1" />
                        <rect x="1.5" y="1.5" width="45" height="45" rx="10" ry="10" fill="transparent" stroke={color} strokeWidth="3" strokeLinecap="round" pathLength="100" strokeDasharray="100" strokeDashoffset={100 - progressPercent} className="transition-all duration-1000 ease-linear" />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center z-10">
                        <span className="text-sm font-bold leading-none" style={{ color: color }}>{label}</span>
                        {unit && <span className="text-[9px] font-bold leading-none mt-0.5 opacity-80" style={{ color: color }}>{unit}</span>}
                    </div>
                </div>
            );
        };

        const OrderProductModal = ({ product, onClose, onConfirm }) => {
            const [selections, setSelections] = useState({});
            const [errors, setErrors] = useState({});
            const [qty, setQty] = useState(1);
            const [optionGroups, setOptionGroups] = useState([]);
            const [currentPrice, setCurrentPrice] = useState(product.price);
            
            const [showSizeChart, setShowSizeChart] = useState(false);
            const [currentSizeChartIndex, setCurrentSizeChartIndex] = useState(0);
            const [currentImgIndex, setCurrentImgIndex] = useState(0);

            const images = product.images && product.images.length > 0 ? product.images : (product.img ? [product.img] : []);
            const sizeCharts = product.sizeCharts && product.sizeCharts.length > 0 ? product.sizeCharts : (product.sizeChart ? [product.sizeChart] : []);

            useEffect(() => {
                if (product.options) {
                    const groups = product.options.split('|').map(group => {
                        const [name, values] = group.split(':');
                        if (name && values) {
                            return {
                                name: name.trim(),
                                choices: values.split(',').map(v => {
                                    const parts = v.split('=');
                                    const label = parts[0].trim();
                                    let priceAddOn = 0;
                                    if (parts.length > 1) { priceAddOn = Number(parts[1].trim().replace('+', '')) || 0; }
                                    return { label, price: priceAddOn };
                                })
                            };
                        }
                        return null;
                    }).filter(g => g !== null);
                    setOptionGroups(groups); setSelections({}); setErrors({});
                }
            }, [product]);

            useEffect(() => {
                let finalPrice = product.price; 
                Object.values(selections).forEach(selected => { if (selected && selected.price) finalPrice += selected.price; });
                setCurrentPrice(finalPrice);
            }, [selections, product.price]);
            
            const total = currentPrice * qty;

            const nextImage = () => setCurrentImgIndex((prev) => (prev + 1) % images.length);
            const prevImage = () => setCurrentImgIndex((prev) => (prev - 1 + images.length) % images.length);

            const handleConfirm = () => {
                const newErrors = {}; let isValid = true;
                optionGroups.forEach(group => { if (!selections[group.name]) { newErrors[group.name] = true; isValid = false; } });
                if (!isValid) {
                    setErrors(newErrors);
                    Swal.fire({ toast: true, position: 'top', icon: 'warning', title: 'กรุณาเลือกตัวเลือกให้ครบ', showConfirmButton: false, timer: 2000 });
                    return;
                }
                let sizeDetail = optionGroups.length > 0 ? Object.entries(selections).map(([key, val]) => `${key}: ${val.label}${val.price > 0 ? ` (+${val.price})` : ''}`).join(', ') : "-";
                onConfirm({ ...product, size: sizeDetail, qty, price: currentPrice, total, img: images[0] });
            };

            const handleSelect = (groupName, choice) => {
                setSelections(prev => ({ ...prev, [groupName]: choice }));
                setErrors(prev => ({ ...prev, [groupName]: false }));
            };

            return (
                <div className="absolute inset-0 bg-[#F0F4F8] z-50 animate-slide-in-right overflow-y-auto no-scrollbar pb-32">
                    <div className="max-w-2xl mx-auto relative">
                        <div className="sticky top-0 z-30 bg-gradient-to-b from-[#F0F4F8] to-transparent pt-4 pb-2 px-5 flex items-center">
                            <button onClick={onClose} className="text-gray-600 bg-white w-10 h-10 rounded-full shadow-md flex items-center justify-center transition active:scale-90 border border-gray-100">
                                <i className="fa-solid fa-chevron-left"></i>
                            </button>
                        </div>
                        <div className="px-5">
                            <div className="relative h-80 bg-gray-100 rounded-[2rem] overflow-hidden mb-6 shadow-sm border border-white">
                                {images.length > 0 ? <img src={getDirectDriveUrl(images[currentImgIndex])} className="w-full h-full object-cover transition-opacity duration-300" onError={(e)=>{e.target.src='https://via.placeholder.com/400?text=No+Image'}} /> : <div className="w-full h-full flex items-center justify-center text-gray-400">ไม่มีรูปภาพ</div>}
                                {images.length > 1 && (
                                    <>
                                        <button onClick={prevImage} className="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 hover:bg-white text-gray-800 rounded-full shadow-md flex items-center justify-center transition backdrop-blur-sm active:scale-95"><i className="fa-solid fa-chevron-left"></i></button>
                                        <button onClick={nextImage} className="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 hover:bg-white text-gray-800 rounded-full shadow-md flex items-center justify-center transition backdrop-blur-sm active:scale-95"><i className="fa-solid fa-chevron-right"></i></button>
                                        <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-2">
                                            {images.map((_, idx) => (<div key={idx} className={`h-1.5 rounded-full transition-all shadow-sm ${idx === currentImgIndex ? 'bg-white w-6' : 'bg-white/50 w-1.5'}`}></div>))}
                                        </div>
                                    </>
                                )}
                            </div>
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-50 mb-6">
                                <h3 className="text-2xl font-extrabold text-gray-900 leading-tight">{product.name}</h3>
                                <p className="text-[#0066FF] font-black text-3xl mt-1 mb-4">{formatCurrency(currentPrice)}</p>
                                {sizeCharts.length > 0 && (
                                    <button onClick={() => setShowSizeChart(true)} className="w-full bg-blue-50/70 hover:bg-blue-100 text-blue-700 py-3.5 rounded-2xl text-sm font-bold transition flex items-center justify-center gap-2 active:scale-95 mb-5 border border-blue-100/50">
                                        <i className="fa-solid fa-ruler-combined text-lg"></i> ดูตารางไซส์ / รายละเอียด
                                        {sizeCharts.length > 1 && <span className="text-xs bg-white/70 px-2 py-0.5 rounded-full text-blue-600 shadow-sm">{sizeCharts.length} รูป</span>}
                                    </button>
                                )}
                                {optionGroups.map((group, idx) => (
                                    <div key={idx} className={`transition-all p-4 rounded-2xl mb-4 ${errors[group.name] ? 'bg-red-50 ring-2 ring-red-200' : 'bg-gray-50 border border-gray-100'}`}>
                                        <label className={`block text-sm font-extrabold mb-3 ${errors[group.name] ? 'text-red-600' : 'text-gray-700'}`}>
                                            {group.name} {errors[group.name] && <span className="text-xs font-normal ml-1 text-red-500">(กรุณาเลือก)</span>}
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {group.choices.map((choice, cIdx) => {
                                                const isSelected = selections[group.name]?.label === choice.label;
                                                return (
                                                    <button key={cIdx} onClick={() => handleSelect(group.name, choice)}
                                                        className={`px-5 py-2.5 rounded-full text-sm font-bold transition-all flex items-center gap-1.5 shadow-sm active:scale-95
                                                        ${isSelected ? 'bg-[#0066FF] text-white shadow-blue-200 ring-4 ring-blue-100' : errors[group.name] ? 'bg-white text-red-500 border border-red-200' : 'bg-white text-gray-600 border border-gray-200 hover:border-blue-300'}`}>
                                                        <span>{choice.label}</span>
                                                        {choice.price > 0 && <span className={`text-[11px] ${isSelected ? 'text-blue-100' : 'text-gray-400'}`}>+{choice.price}</span>}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                                <div className="flex items-center justify-between pt-4 mt-2 border-t border-gray-100">
                                    <label className="block text-base font-extrabold text-gray-700">จำนวน</label>
                                    <div className="flex items-center gap-1">
                                        <div className="flex items-center bg-gray-50 rounded-full p-1 border border-gray-200">

                                            <span className="text-lg font-bold w-12 text-center text-gray-800">{qty}</span>
                                            <button onClick={() => setQty(q => Math.min(product.stock, q + 1))} disabled={qty >= product.stock} className={`w-9 h-9 rounded-full flex items-center justify-center text-lg font-bold shadow-sm transition active:scale-90 ${qty >= product.stock ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'bg-white text-[#0066FF]'}`}><i className="fa-solid fa-plus"></i></button>

                                    </div>
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex justify-between items-center gap-4">
                                <div>
                                    <p className="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">ยอดชำระรวม</p>
                                    <p className="text-2xl font-black text-[#0066FF] leading-none">{formatCurrency(total)}</p>
                                </div>
                                <button onClick={handleConfirm} className="flex-1 bg-[#0066FF] text-white px-6 py-4 rounded-[1.5rem] font-bold shadow-lg shadow-blue-200 transition transform active:scale-95 flex items-center justify-center text-lg">
                                    ชำระเงิน <i className="fa-solid fa-arrow-right ml-2"></i>
                                </button>
                            </div>
                        </div>

                        {showSizeChart && ReactDOM.createPortal(
                            <div className="fixed inset-0 z-[9999] bg-black/95 flex flex-col items-center justify-center animate-[fadeIn_0.2s_ease-out] p-4">

                                <div className="relative w-full h-full flex items-center justify-center">
                                    <img src={getDirectDriveUrl(sizeCharts[currentSizeChartIndex])} className="max-w-full max-h-full object-contain rounded-2xl" />

                                </div>
                                
                                <div className="flex gap-3 relative z-50 shrink-0">
                                    <button onClick={() => fetchData(false)} className={`w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center active:scale-90 transition border border-gray-200 shadow-sm text-gray-600 hover:bg-gray-100 ${loading ? 'animate-spin text-[#0066FF]':''}`}><i className="fa-solid fa-rotate-right text-sm"></i></button>
                                </div>
                            </div>

                            <div className={`transition-all duration-500 ease-in-out overflow-hidden flex justify-center pointer-events-auto ${tab === 'home' && !isSubPageOpen ? 'max-h-20 opacity-100 mt-4 mb-1' : 'max-h-0 opacity-0 mt-0 mb-0'}`}>
                                <div className="px-1 text-center flex flex-col items-center">
                                    <h1 className="text-xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-[#0066FF] to-indigo-600">MedTech 67</h1>
                                    <p className="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mt-0.5">Finance System</p>
                                </div>
                            </div>
                        </header>

                        <main className="flex-1 w-full relative overflow-hidden">
                            <div className={`absolute inset-0 px-5 pt-32 pb-36 overflow-y-auto no-scrollbar transition-opacity duration-300 ${isSubPageOpen ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                                {tab === 'home' && hasAccess('home') && renderHomeContent()}
                                {tab === 'finance' && hasAccess('finance') && renderFinanceContent()}
                                
                                {tab === 'bills' && hasAccess('bills') && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 animate-pop pt-2">
                                        {data?.bills?.length === 0 && !loading && (
                                            <div className="bg-white p-8 rounded-[2rem] text-center shadow-sm border border-gray-50 md:col-span-2 lg:col-span-3">
                                                <div className="text-6xl mb-4">🎉</div>
                                                <h3 className="font-bold text-gray-800 text-lg">ยอดเยี่ยมมาก!</h3>
                                                <p className="text-gray-500 text-sm mt-1">ไม่มีบิลค้างชำระในขณะนี้</p>
                                            </div>
                                        )}
                                        {(data?.bills || []).map(bill => {
                                            const isNoDate = !bill.dueDate || String(bill.dueDate || '').includes('1899') || String(bill.dueDate || '').includes('1970');
                                            const isOverdue = bill.daysLate > 0 && bill.status !== 'รอตรวจสอบ';
                                            return (
                                                <div key={bill.billId} className={`bg-white rounded-[1.5rem] p-5 shadow-sm relative overflow-hidden transition-all duration-300 flex flex-col justify-between ${isOverdue ? 'border-2 border-red-400 shadow-red-100 ring-4 ring-red-50' : 'border border-gray-100'}`}>
                                                    <div>
                                                        {isOverdue && (
                                                            <div className="bg-red-50 text-red-700 px-4 py-3 rounded-xl mb-4 border border-red-100 flex items-start gap-3 animate-[pop_0.4s_ease-out]">
                                                                <div className="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center shrink-0 mt-0.5 animate-pulse"><i className="fa-solid fa-triangle-exclamation text-red-500 text-sm"></i></div>
                                                                <div><h5 className="font-bold text-sm">เกินกำหนดชำระ {bill.daysLate} วัน</h5><p className="text-[10px] font-medium text-red-500 mt-0.5 leading-snug">กรุณารีบดำเนินการชำระเงินโดยด่วน เพื่อหลีกเลี่ยงค่าปรับเพิ่มเติม</p></div>
                                                            </div>
                                                        )}
                                                        <div className="flex justify-between items-start mb-4">
                                                            <div className="flex gap-3">
                                                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl shadow-inner shrink-0 ${isOverdue ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-[#0066FF]'}`}><i className="fa-solid fa-file-invoice-dollar"></i></div>
                                                                <div>
                                                                    <h4 className="font-bold text-gray-800 text-base line-clamp-1 pr-2">{bill.item}</h4>
                                                                    <p className={`text-[11px] font-bold mt-1 px-2 py-0.5 inline-block rounded-md ${isOverdue ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-500'}`}>ครบกำหนด: {isNoDate ? 'ไม่มีกำหนด' : bill.dueDate}</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <div className="bg-gray-50 rounded-2xl p-4 mb-5 border border-gray-100 space-y-2.5">
                                                            <div className="flex justify-between items-center text-xs font-medium text-gray-500"><span><i className="fa-solid fa-receipt mr-1.5 opacity-50"></i> ยอดบิลเริ่มต้น</span><span>{formatCurrency(bill.amount)}</span></div>
                                                            {bill.discount > 0 && <div className="flex justify-between items-center text-xs font-bold text-green-600"><span><i className="fa-solid fa-tags mr-1.5 opacity-70"></i> ส่วนลด / หักยอดโอนแล้ว</span><span>-{formatCurrency(bill.discount)}</span></div>}
                                                            {bill.fine > 0 && <div className="flex justify-between items-center text-xs font-bold text-red-500"><span><i className="fa-solid fa-scale-unbalanced mr-1.5 opacity-70"></i> ค่าปรับล่าช้า ({bill.daysLate} วัน)</span><span>+{formatCurrency(bill.fine)}</span></div>}
                                                            <div className="pt-2.5 mt-1 border-t border-gray-200/80 flex justify-between items-center"><span className="text-xs font-bold text-gray-800 uppercase tracking-wider">ยอดชำระสุทธิ</span><span className={`font-black text-xl ${isOverdue ? 'text-red-600' : 'text-[#0066FF]'}`}>{formatCurrency(bill.total)}</span></div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-3 mt-auto">
                                                        {bill.status !== 'รอตรวจสอบ' && !isOverdue && !isNoDate && <BillTimer dueDate={bill.dueDate} />}
                                                        {bill.status === 'รอตรวจสอบ' ? (
                                                            <button disabled className="flex-1 bg-yellow-50 text-yellow-600 py-3.5 rounded-xl text-sm font-bold border border-yellow-100/50 flex justify-center items-center gap-2">รอตรวจสอบ <div className="loader w-4 h-4 border-2 border-yellow-600 border-t-transparent rounded-full animate-spin"></div></button>
                                                        ) : (
                                                            <button onClick={() => setSelectedBill(bill)} className={`flex-1 py-3.5 rounded-xl text-white text-sm font-bold shadow-lg active:scale-95 transition-all transform flex justify-center items-center gap-2 ${isOverdue ? 'bg-red-500 shadow-red-200 hover:bg-red-600' : 'bg-[#0066FF] shadow-blue-200 hover:bg-blue-700'}`}>ชำระเงิน <i className="fa-solid fa-arrow-right"></i></button>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                                {tab === 'orders' && hasAccess('orders') && (
                                    <div className="animate-pop pt-2">
                                        {(!data?.products || data.products.filter(p => p.status !== 'OFF').length === 0) ? (
                                            <div className="bg-white rounded-[2rem] p-10 text-center shadow-sm border border-gray-50 mt-4">
                                                <div className="text-5xl mb-3 text-gray-300"><i className="fa-solid fa-store-slash"></i></div>
                                                <h3 className="font-bold text-gray-800 text-lg">ยังไม่มีสินค้า</h3>
                                                <p className="text-gray-400 text-sm mt-1">ขณะนี้ยังไม่มีรายการสินค้าเปิดจำหน่าย</p>
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                                {data.products.map(p => {
                                                    if (p.status === 'OFF') return null;
                                                    const isSoldOut = p.status === 'OUT' || p.stock <= 0;
                                                    return (
                                                        <div key={p.id} onClick={() => !isSoldOut && setSelectedProduct(p)} className={`bg-white rounded-2xl overflow-hidden shadow-sm active:scale-95 transition-transform border border-gray-50 cursor-pointer ${isSoldOut ? 'grayscale opacity-70' : 'hover:border-blue-200 hover:shadow-md'}`}>
                                                            <div className="aspect-square bg-gray-100 relative">
                                                                <img src={getDirectDriveUrl(p.img)} className="w-full h-full object-cover" />
                                                                {!isSoldOut && <div className="absolute bottom-2 right-2 w-8 h-8 bg-white/90 backdrop-blur-sm rounded-full shadow-sm flex items-center justify-center text-[#0066FF] font-bold"><i className="fa-solid fa-plus"></i></div>}
                                                            </div>
                                                            <div className="p-3 bg-white">
                                                                <h4 className="font-bold text-gray-800 text-sm truncate">{p.name}</h4>
                                                                <div className="flex justify-between items-center mt-1">
                                                                    <span className="text-[#0066FF] font-black">{formatCurrency(p.price)}</span>
                                                                    {isSoldOut && <span className="text-[10px] font-bold bg-red-100 text-red-500 px-2 py-0.5 rounded-md">หมด</span>}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {tab === 'history' && hasAccess('history') && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 animate-pop pt-2">
                                        {(data?.history || []).map((hist, i) => (
                                            <div key={i} className="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border-l-4 border-gray-100 hover:border-[#0066FF] transition-colors">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white shadow-sm ${hist.status==='ชำระแล้ว'?'bg-emerald-500':'bg-yellow-400'}`}><i className={`fa-solid ${hist.status==='ชำระแล้ว'?'fa-check':'fa-clock'}`}></i></div>
                                                    <div><h4 className="font-bold text-gray-800 text-sm line-clamp-1">{hist.item}</h4><p className="text-[10px] font-bold text-gray-400 mt-0.5">{hist.payDate}</p></div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-black text-[#0066FF]">{formatCurrency(hist.total)}</p>
                                                    {hist.slip && <button onClick={() => setViewSlipUrl(hist.slip)} className="text-[10px] font-bold text-gray-400 hover:text-[#0066FF] bg-gray-50 hover:bg-blue-50 px-2 py-1 rounded-md mt-1 transition-colors">ดูสลีป</button>}
                                                </div>
                                            </div>
                                        ))}
                                        {data?.history?.length === 0 && <div className="text-center text-gray-400 py-10 font-bold bg-white rounded-3xl border border-gray-50 md:col-span-2 lg:col-span-3"><div className="text-4xl mb-2 opacity-30"><i className="fa-solid fa-clock-rotate-left"></i></div>ไม่มีประวัติทำรายการ</div>}
                                    </div>
                                )}
                                
                                {tab === 'settings' && hasAccess('settings') && renderSettingsContent()}
                            </div>

                            {selectedBill && <PaymentModal bill={selectedBill} user={user} onClose={()=>setSelectedBill(null)} onSuccess={()=>{setSelectedBill(null); fetchData();}} />}
                            {selectedProduct && <OrderProductModal product={selectedProduct} onClose={()=>setSelectedProduct(null)} onConfirm={(p) => { setSelectedProduct(null); setPendingOrder(p); }} />}
                            {pendingOrder && <OrderPaymentModal order={pendingOrder} user={user} qrMap={data?.qrMap} defaultQr={data?.defaultQr} onClose={()=>setPendingOrder(null)} onSuccess={() => { setPendingOrder(null); fetchData(); }} />}
                            {selectedProject && <FinanceProjectSubPage project={selectedProject} onClose={()=>setSelectedProject(null)} onViewSlip={setViewSlipUrl} />}
                            {trackingOrder && <OrderTrackingSubPage order={trackingOrder} onClose={() => setTrackingOrder(null)} />}

                        </main> 

                        {showAnnouncement && data?.announcement && <AnnouncementModal text={data.announcement} onClose={() => setShowAnnouncement(false)} />}

                        <div className={`absolute bottom-0 left-0 right-0 z-40 transition-all duration-500 ease-in-out flex justify-center pb-safe pt-12 px-4 ${isSubPageOpen || tab === 'finance' ? 'translate-y-32 opacity-0 pointer-events-none' : 'translate-y-0 opacity-100 pointer-events-none'}`}>
                            
                            <div className="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-[#F0F4F8] via-[#F0F4F8]/90 to-transparent pointer-events-auto"></div>
                            
                            <nav className="relative z-10 pointer-events-auto bg-white/95 backdrop-blur-md rounded-[2rem] shadow-[0_10px_30px_-10px_rgba(0,102,255,0.15)] px-2 py-1.5 flex justify-between items-center w-full max-w-md border border-white/50 flex-shrink-0">
                                {renderNavItem('home', 'fa-house', 'หน้าแรก', 0)}
                                {renderNavItem('bills', 'fa-file-invoice-dollar', 'บิล', data?.bills?.length || 0)}
                                {data?.orderEnabled && renderNavItem('orders', 'fa-bag-shopping', 'ร้านค้า', 0)}
                                {renderNavItem('history', 'fa-clock-rotate-left', 'ประวัติ', 0)}
                                {renderNavItem('settings', 'fa-gear', 'ตั้งค่า', 0)}
                            </nav>
                        </div>

                        {viewSlipUrl && <SlipModal url={viewSlipUrl} onClose={() => setViewSlipUrl(null)} />}

                    </div>
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState('loading'); 
            const [user, setUser] = useState(null);
            const [dashboardData, setDashboardData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [liffUserId, setLiffUserId] = useState(null); 

            const handleLineLogin = () => {
                if (typeof liff !== 'undefined') {
                    if (!liff.isLoggedIn()) {
                        liff.login(); 
                    } else {
                        Swal.fire({
                            icon: 'info',
                            title: 'ยังไม่ได้ผูกบัญชี LINE',
                            html: '<p class="text-sm text-gray-500 mt-2">กรุณาเข้าสู่ระบบด้วย <b>รหัสนักศึกษา</b> และ <b>รหัสผ่าน</b> ของคุณในครั้งแรก เพื่อให้ระบบทำการผูกบัญชีให้อัตโนมัติครับ</p>',
                            confirmButtonText: 'ตกลง',
                            confirmButtonColor: '#0066FF',
                            customClass: { popup: 'rounded-3xl pb-6', title: 'text-xl font-bold text-gray-800 pt-2', confirmButton: 'rounded-xl px-8 py-2.5 font-bold shadow-md' }
                        });
                    }
                }
            };

            useEffect(() => {
                const initializeApp = async () => {
                    try {
                        const resStatus = await runGoogleScript('checkStatus');
                        if (resStatus && resStatus.maintenance) {
                            setPage('maintenance');
                            return;
                        }

                        if (typeof liff !== 'undefined') {
                            try {
                                await liff.init({ liffId: "2009556969-8SWGBXPW" });
                                
                                if (liff.isLoggedIn()) {
                                    const profile = await liff.getProfile();
                                    const lineId = profile.userId;
                                    setLiffUserId(lineId);
                                    
                                    setPage('loading');

                                    const loginRes = await runGoogleScript('loginWithLine', [lineId]);
                                    
                                    if (loginRes.success) {
                                        let dashData = await runGoogleScript('getDashboardData', [loginRes.studentId, true]);
                                        setUser(loginRes);
                                        setDashboardData(dashData);
                                        setPage('dashboard');
                                        
                                        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });
                                        Toast.fire({ icon: 'success', title: `เข้าสู่ระบบผ่าน LINE สำเร็จ` });
                                        return; 
                                    }
                                }
                            } catch (liffError) {
                                console.error("LIFF Init failed", liffError);
                            }
                        }

                        setPage('login');
                    } catch (e) {
                        console.error("Check status failed", e);
                        setPage('login'); 
                    }
                };
                initializeApp();
            }, []);

            const handleLogin = async (u, p) => {
                if(!u || !p) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
                setLoading(true);
                try {
                    let res;
                    
                    if (liffUserId) {
                        res = await runGoogleScript('bindLineUser', [u, p, liffUserId]);
                        if(res.success && res.studentId) {
                            u = res.studentId; 
                            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'เชื่อมต่อบัญชี LINE สำเร็จ', showConfirmButton: false, timer: 3000 });
                        }
                    } else {
                        res = await runGoogleScript('loginUser', [u, p]);
                    }

                    if(res.success) {
                        let dashData = res.dashboardData;
                        if (!dashData) { dashData = await runGoogleScript('getDashboardData', [u, true]); }
                        
                        if(!res.permissions) res.permissions = ['home', 'bills', 'orders', 'history', 'finance', 'settings'];
                        if(!res.studentId) res.studentId = u;

                        setUser(res); 
                        setDashboardData(dashData); 
                        setPage('dashboard');

                        if (!dashData.announcement && !liffUserId) {
                            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });
                            Toast.fire({ icon: 'success', title: `ยินดีต้อนรับ คุณ${res.name || u}` });
                        }
                    } else { 
                        Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: res.message, customClass: { popup: 'rounded-2xl' } }); 
                    }
                } catch(e) { 
                    Swal.fire('Error', e.toString(), 'error'); 
                }
                setLoading(false);
            };

            const handleRegisterSuccess = (u) => { setPage('login'); };

            const handleLogout = () => {
                setUser(null); 
                setDashboardData(null);
                setPage('login'); 
            };

            return (
                <div>
                    {page === 'loading' && <Loading />} 
                    {page === 'maintenance' && <MaintenanceMode />} 
                    {page === 'login' && <Login onLogin={handleLogin} onRegister={() => setPage('register')} onLineLogin={handleLineLogin} />}
                    {page === 'register' && <Register onBack={() => setPage('login')} onRegisterSuccess={handleRegisterSuccess} />}
                    {page === 'dashboard' && user && <Dashboard user={user} initialData={dashboardData} onLogout={handleLogout} />}
                    {loading && <Loading />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
