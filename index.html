<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Finance of Medtech 67</title>

    <link rel="icon" type="image/png" href="./images/MEDTECH67.png?v=1">
    <link rel="apple-touch-icon" href="./images/MEDTECH67.png?v=1">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #F0F4F8;
            color: #1F2937;
            -webkit-tap-highlight-color: transparent; 
        }

        /* ใส่ในแท็บ <style> เดิมของคุณ */
        @media screen and (max-width: 768px) {
            input, select, textarea {
            font-size: 16px !important; /* บังคับให้เป็น 16px เฉพาะในมือถือ */
          }
        }

        /* 📱 iOS Slide In Animation */
        @keyframes slideInRight {
            0% { transform: translateX(100%); opacity: 0.5; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-in-right { 
            animation: slideInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1) forwards; 
        }

        /* Animations */
        @keyframes blink-border {
            0%, 100% { border-color: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { border-color: #fee2e2; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2); }
        }
        .overdue-card { animation: blink-border 2s infinite; border-width: 2px !important; z-index: 10; }
        
        .animate-marquee { animation: marquee 2s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .loader { border: 4px solid #e0f2fe; border-top: 4px solid #2563eb; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html { scroll-behavior: smooth; }

        /* Animation Timer */
        @keyframes border-flow {
            0% { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
            50% { border-color: #2563eb; box-shadow: 0 0 25px rgba(37, 99, 235, 0.8); }
            100% { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        }
        .popup-timer-border { border: 3px solid transparent; animation: border-flow 1.5s infinite; border-radius: 1.5rem !important; }

        /* Loading Text */
        .loading-text:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }

        /* Background Decoration */
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(20px) rotate(360deg); opacity: 0; }
        }
        .falling-item {
            position: fixed; top: -10%; z-index: -1; user-select: none; pointer-events: none;
            animation-name: fall; animation-timing-function: linear; animation-iteration-count: infinite;
        }

        /* New App Animations */
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* iOS Bottom Safe Area */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.25rem); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0.5rem); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 🌐 API Connection (ยิงข้อมูลไปหา Google Script)
        // ==========================================
        // ⚠️ เอา Web App URL ที่ก๊อปปี้มาจากขั้นตอนที่ 2 มาใส่ในเครื่องหมายคำพูดด้านล่างนี้ครับ
        const API_URL = "https://script.google.com/macros/s/AKfycbzEXjfZSgs3riQmjc22AZu45dn50etSm_lMqkior3UmHa8M84mwW_7qoqXCl2N3XX--sw/exec";

        const runGoogleScript = async (funcName, args = []) => {
            try {
                // เปลี่ยนจากการเรียกใช้ google.script.run เป็นการยิง fetch (POST) ไปหา API
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ action: funcName, args: args })
                });
                
                const result = await response.json();
                
                // ถ้าระบบหลังบ้านพ่น Error ออกมา
                if (result.error) {
                    throw new Error(result.error);
                }
                return result;

            } catch (error) {
                console.error(`[API Error] ${funcName}:`, error);
                throw error;
            }
        };

        const formatCurrency = (val) => new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB' }).format(val);
        
        const getDirectDriveUrl = (url) => {
            if (!url) return "https://via.placeholder.com/400x300?text=No+Image";
            if (url.indexOf("lh3.googleusercontent.com") !== -1 || url.indexOf("googleusercontent.com/profile") !== -1) return url;
            try {
                var id = "";
                if (url.indexOf("file/d/") !== -1) id = url.split("file/d/")[1].split("/")[0];
                else if (url.indexOf("id=") !== -1) id = url.split("id=")[1].split("&")[0];
                if (id) return "https://lh3.googleusercontent.com/d/" + id;
                return url; 
            } catch (e) {
                return "https://via.placeholder.com/400x300?text=Error";
            }
        };

        // ==========================================
        // Helper UI Components
        // ==========================================
        const fireAutoCloseAlert = (title, text) => {
            return Swal.fire({
                title: title, html: `<p class="text-gray-600 text-lg">${text}</p>`, icon: 'success',
                showConfirmButton: true, confirmButtonText: 'ตกลง', confirmButtonColor: '#0066FF', allowOutsideClick: false,
                customClass: { popup: 'rounded-3xl pb-8 pt-6', title: 'text-2xl font-bold text-gray-800', confirmButton: 'rounded-xl px-10 py-3 font-bold shadow-lg text-base hover:scale-105 transition-transform' }
            });
        };

        const fireErrorAlert = (title, text) => {
            return Swal.fire({
                title: title, html: `<div class="px-2"><p class="text-gray-600">${text}</p></div>`, icon: 'error',
                showConfirmButton: true, confirmButtonText: 'ปิด', confirmButtonColor: '#EF4444',
                customClass: { popup: 'rounded-3xl pb-6', title: 'text-xl font-bold text-red-600', confirmButton: 'rounded-xl px-8 py-2.5 font-bold shadow-md text-sm' }
            });
        };

        const fireOrderSuccessAlert = (orderId) => {
            const qrUrl = `https://quickchart.io/qr?text=${orderId}&size=200`;
            return Swal.fire({
                title: 'สั่งซื้อสำเร็จ!',
                html: `
                    <div class="flex flex-col items-center">
                        <div class="bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-sm font-bold mb-4 border border-blue-100">บันทึกข้อมูลแล้ว</div>
                        <div class="bg-white p-2 border rounded-xl shadow-sm mb-2"><img src="${qrUrl}" class="w-32 h-32 rounded-lg" alt="Order QR" /></div>
                        <p class="text-xs text-gray-400 mb-2">Order ID</p>
                        <p class="text-xl font-mono font-bold text-[#0066FF] bg-blue-50 px-4 py-1 rounded-lg border border-blue-100 tracking-wider mb-4">${orderId}</p>
                        <div class="text-sm text-gray-500 bg-gray-50 p-3 rounded-xl w-full text-center border border-gray-100">
                            <i class="fa-solid fa-clock-rotate-left mr-1"></i> ตรวจสอบสถานะได้ที่เมนู<br><span class="text-gray-800 font-bold">"ประวัติการสั่งซื้อ"</span>
                        </div>
                    </div>
                `,
                icon: 'success', showConfirmButton: true, confirmButtonText: 'ตกลง', confirmButtonColor: '#0066FF', allowOutsideClick: false,
                customClass: { popup: 'rounded-3xl pb-6', title: 'text-2xl font-bold text-gray-800', confirmButton: 'rounded-xl px-10 py-3 font-bold shadow-lg text-base mt-2' }
            });
        };

        const Loading = () => ReactDOM.createPortal(
            <div className="fixed inset-0 bg-black/60 z-[9999] flex items-center justify-center backdrop-blur-sm">
                <div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center animate-bounce">
                    <div className="loader mb-3"></div>
                    <p className="text-[#0066FF] font-bold">กำลังประมวลผล...</p>
                </div>
            </div>,
            document.body
        );

        const ProgressLoading = ({ progress }) => ReactDOM.createPortal(
            <div className="fixed inset-0 bg-black/80 z-[9999] flex items-center justify-center backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]">
                <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm flex flex-col items-center relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 via-blue-600 to-blue-400 animate-marquee"></div>
                    <div className="relative w-24 h-24 flex items-center justify-center mb-4">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#e5e7eb" strokeWidth="8" />
                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#0066FF" strokeWidth="8" strokeDasharray="251.2" strokeDashoffset={251.2 - (251.2 * progress) / 100} strokeLinecap="round" className="transition-all duration-300 ease-out" />
                        </svg>
                        <span className="absolute text-2xl font-bold text-[#0066FF]">{progress}%</span>
                    </div>
                    <h3 className="text-lg font-bold text-gray-800 mb-1 loading-text">กำลังตรวจสอบสลีป</h3>
                    <p className="text-xs text-gray-500">ผ่านระบบ SlipOK อัตโนมัติ</p>
                </div>
            </div>,
            document.body
        );

       // ==========================================
        // 🖼️ หน้าต่างดูสลีป (ปรับขนาดให้เล็กลงและดูง่ายขึ้น)
        // ==========================================
        const SlipModal = ({ url, onClose }) => {
            const [imgSrc, setImgSrc] = useState(null);
            useEffect(() => { setImgSrc(getDirectDriveUrl(url)); }, [url]);
            
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[9999] bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 animate-[fadeIn_0.2s_ease-out]" onClick={onClose}>
                    <div className="bg-white w-full max-w-sm rounded-[2rem] overflow-hidden shadow-2xl animate-[pop_0.3s_ease-out] relative" onClick={e => e.stopPropagation()}>
                        
                        {/* ปุ่มปิดมุมขวาบน */}
                        <button onClick={onClose} className="absolute top-4 right-4 w-10 h-10 bg-black/10 hover:bg-black/20 rounded-full flex items-center justify-center transition active:scale-90 z-10">
                            <i className="fa-solid fa-xmark text-gray-600 text-xl"></i>
                        </button>

                        {/* หัวข้อ */}
                        <div className="p-5 border-b border-gray-50 flex items-center gap-3">
                            <div className="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-[#0066FF]">
                                <i className="fa-solid fa-receipt text-lg"></i>
                            </div>
                            <div>
                                <h3 className="font-bold text-gray-800 leading-none">หลักฐาน</h3>
                                <p className="text-[10px] text-gray-400 mt-1 uppercase tracking-wider">Evidence</p>
                            </div>
                        </div>

                        {/* พื้นที่แสดงรูปภาพ (จำกัดความสูงไม่ให้เกินหน้าจอ) */}
                        <div className="p-4 bg-gray-50">
                            <div className="bg-white rounded-2xl overflow-hidden shadow-inner border border-gray-100 flex items-center justify-center min-h-[250px] max-h-[60vh]">
                                <img src={imgSrc} className="w-full h-full object-contain" alt="Slip" 
                                    onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/400x500?text=Image+Load+Error'; }} 
                                />
                            </div>
                        </div>

                        {/* ปุ่มกดดูรูปเต็ม */}
                        <div className="p-4 bg-white">
                            <a href={url} target="_blank" className="w-full bg-blue-50 hover:bg-blue-100 text-[#0066FF] font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 text-sm">
                                <i className="fa-solid fa-up-right-from-square text-xs"></i> เปิดดูรูปภาพต้นฉบับ
                            </a>
                        </div>
                    </div>
                </div>,
                document.body
            );
        };

        // ==========================================
        // 📢 หน้าต่างป๊อปอัปประกาศสำคัญ (เด้งขึ้นมาสวยๆ)
        // ==========================================
        const AnnouncementModal = ({ text, onClose }) => {
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[9999] bg-black/60 backdrop-blur-sm flex items-center justify-center p-5 animate-[fadeIn_0.2s_ease-out]" onClick={onClose}>
                    <div className="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden animate-[pop_0.3s_ease-out]" onClick={e => e.stopPropagation()}>
                        <div className="bg-gradient-to-br from-blue-600 to-indigo-600 p-6 text-center relative overflow-hidden">
                            <div className="absolute -right-4 -top-4 opacity-20"><i className="fa-solid fa-bullhorn text-8xl text-white"></i></div>
                            <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3 backdrop-blur-md border border-white/30 shadow-inner">
                                <i className="fa-solid fa-bell text-3xl text-white animate-[ring_2s_ease-in-out_infinite]"></i>
                            </div>
                            <h2 className="text-2xl font-bold text-white tracking-tight relative z-10">ประกาศสำคัญ</h2>
                        </div>
                        <div className="p-6 max-h-[50vh] overflow-y-auto no-scrollbar bg-gray-50/30">
                            <p className="text-gray-700 leading-relaxed whitespace-pre-wrap font-medium">{text}</p>
                        </div>
                        <div className="p-4 border-t border-gray-100 bg-white">
                            <button onClick={onClose} className="w-full bg-[#0066FF] hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 active:scale-95 transition-transform text-lg flex justify-center items-center gap-2">
                                รับทราบ <i className="fa-solid fa-check-circle"></i>
                            </button>
                        </div>
                    </div>
                </div>,
                document.body
            );
        };

        // ==========================================
        // Auth Themes & Components
        // ==========================================
        const useFestivalTheme = () => {
            const date = new Date();
            const month = date.getMonth() + 1; 
            const day = date.getDate();
            const isRange = (m1, d1, m2, d2) => {
                const cur = month * 100 + day;
                return cur >= (m1 * 100 + d1) && cur <= (m2 * 100 + d2);
            };

            let theme = {
                name: 'default',
                bgGradient: 'from-blue-50 to-indigo-100', headerGradient: 'from-blue-600 to-indigo-600',
                buttonColor: 'bg-blue-600 hover:bg-blue-700', accentColor: 'text-blue-600',
                mascot: 'https://img5.pic.in.th/file/secure-sv1/-8f8bd3b6672e701d.png', decoration: null 
            };

            if (isRange(1, 1, 1, 9)) theme = { name: 'newyear', bgGradient: 'from-yellow-50 to-orange-100', headerGradient: 'from-orange-500 to-yellow-500', buttonColor: 'bg-orange-500 hover:bg-orange-600', accentColor: 'text-orange-600', mascot: 'https://cdn-icons-png.flaticon.com/512/13373/13373572.png', decoration: ['🎉', '🎆', '2026', '✨'] };
            else if (isRange(2, 15, 2, 17)) theme = { name: 'cny', bgGradient: 'from-red-50 to-yellow-100', headerGradient: 'from-red-600 to-red-500', buttonColor: 'bg-red-600 hover:bg-red-700', accentColor: 'text-red-700', mascot: 'https://cdn-icons-png.flaticon.com/512/14231/14231241.png', decoration: ['🧧', '🏮', '💰', '🐉'] };
            else if (isRange(2, 10, 2, 14)) theme = { name: 'valentine', bgGradient: 'from-pink-50 to-rose-100', headerGradient: 'from-pink-500 to-rose-500', buttonColor: 'bg-pink-500 hover:bg-pink-600', accentColor: 'text-pink-600', mascot: 'https://cdn-icons-png.flaticon.com/512/14122/14122588.png', decoration: ['❤️', '💖', '💌', '🌹','LOVE'] };
            else if (isRange(4, 10, 4, 16)) theme = { name: 'songkran', bgGradient: 'from-cyan-50 to-blue-200', headerGradient: 'from-cyan-500 to-blue-500', buttonColor: 'bg-cyan-600 hover:bg-cyan-700', accentColor: 'text-cyan-600', mascot: 'https://cdn-icons-png.flaticon.com/512/4524/4524490.png', decoration: ['💦', '🔫', '🌺', '💧'] };
            else if (isRange(10, 20, 10, 31)) theme = { name: 'halloween', bgGradient: 'from-purple-100 to-orange-200', headerGradient: 'from-purple-800 to-orange-600', buttonColor: 'bg-purple-800 hover:bg-purple-900', accentColor: 'text-purple-800', mascot: 'https://cdn-icons-png.flaticon.com/512/5833/5833493.png', decoration: ['🎃', '👻', '🦇', '🕸️'] };
            else if (isRange(11, 20, 11, 25)) theme = { name: 'loykrathong', bgGradient: 'from-indigo-100 to-yellow-50', headerGradient: 'from-indigo-600 to-blue-700', buttonColor: 'bg-indigo-600 hover:bg-indigo-700', accentColor: 'text-indigo-700', mascot: 'https://cdn-icons-png.flaticon.com/512/8716/8716920.png', decoration: ['🪷', '🌕', '🕯️', '🎆'] };
            else if (isRange(12, 10, 12, 31)) theme = { name: 'christmas', bgGradient: 'from-green-50 to-red-100', headerGradient: 'from-green-600 to-red-600', buttonColor: 'bg-green-700 hover:bg-green-800', accentColor: 'text-green-700', mascot: 'https://cdn-icons-png.flaticon.com/512/6240/6240060.png', decoration: ['🎄', '🎅', '❄️', '🎁'] };
            return theme;
        };

        const BackgroundDecoration = ({ items }) => {
            if (!items) return null;
            const flakes = Array.from({ length: 15 }).map((_, i) => {
                const style = { left: `${Math.random() * 100}vw`, animationDuration: `${Math.random() * 5 + 5}s`, animationDelay: `${Math.random() * 5}s`, fontSize: `${Math.random() * 20 + 20}px` };
                return <div key={i} className="falling-item" style={style}>{items[i % items.length]}</div>
            });
            return <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">{flakes}</div>;
        };

       // ==========================================
        // 🔐 Login Component (ปรับระยะให้กระชับขึ้น พอดีจอมือถือ)
        // ==========================================
        const Login = ({ onLogin, onRegister }) => {
            const [id, setId] = useState('');
            const [pass, setPass] = useState('');

            return (
                <div className="min-h-screen flex items-center justify-center p-5 bg-[#F0F4F8] relative overflow-hidden">
                    {/* Background Blobs */}
                    <div className="absolute top-[-10%] left-[-10%] w-72 h-72 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-72 h-72 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse animation-delay-2000"></div>

                    <div className="w-full max-w-sm relative z-10">
                        {/* ✅ ลดระยะห่างด้านล่างโลโก้จาก mb-8 เป็น mb-5 */}
                        <div className="text-center mb-2">
                            <div className="relative inline-block">
                                <div className="absolute inset-0 bg-blue-400 rounded-full blur-2xl opacity-20 animate-pulse"></div>
                                <div className="relative w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-[0_10px_40px_-10px_rgba(0,102,255,0.3)] border-4 border-white overflow-hidden z-10">
                                    <img 
                                        src={getDirectDriveUrl('https://drive.google.com/file/d/1xUmu5w6937s_xEeuxttKeqIOShPbP8_P/view?usp=drivesdk')} 
                                        alt="MedTech 67 Logo" 
                                        className="w-XL h-full object-cover rounded-full transform transition-transform scale-150 hover:scale-[1.65] duration-500" 
                                        onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150?text=Logo'; }}
                                    />
                                </div>
                            </div>

                            {/* ✅ ลดระยะห่างตัวหนังสือ mt-5 เป็น mt-3 */}
                            <h1 className="text-2xl font-black text-gray-800 tracking-tight mt-3">ระบบชำระเงินชั้นปีที่ 3</h1>
                            <p className="text-[#0066FF] mt-0.5 font-extrabold text-sm tracking-wide">MedTech 67 Payment System</p>
                        </div>

                        {/* ✅ ลด padding ในกล่องจาก p-8 เป็น p-6 */}
                        <div className="bg-white/80 backdrop-blur-xl p-6 rounded-[2rem] shadow-xl shadow-blue-900/5 border border-white">
                            {/* ✅ ลดระยะห่างระหว่างช่องกรอกจาก space-y-5 เป็น space-y-4 */}
                            <div className="space-y-4">
                                <div className="space-y-1.5">
                                    <label className="text-[11px] font-bold text-gray-500 ml-1 uppercase tracking-wider">รหัสนักศึกษา</label>
                                    <div className="relative group">
                                        <span className="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-[#0066FF] transition-colors">
                                            <i className="fa-solid fa-user-graduate"></i>

        // ==========================================
        // Widgets: BillTimer
        // ==========================================
        const BillTimer = ({ dueDate }) => {
            const [timeLeft, setTimeLeft] = useState(null);
            const [progressPercent, setProgressPercent] = useState(100);

            useEffect(() => {
                const calculateTime = () => {
                    if (!dueDate) return;
                    const parts = dueDate.split('/');
                    const target = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                    target.setHours(23, 59, 59); 
                    const now = new Date();
                    const diff = target - now;

                    if (diff <= 0) { setTimeLeft(null); return; }

                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    setTimeLeft({ days, hours, minutes, seconds });

                    const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
                    let pct = (diff / THIRTY_DAYS_MS) * 100;
                    if (pct > 100) pct = 100;
                    if (pct < 0) pct = 0;
                    setProgressPercent(pct);
                };

                calculateTime();
                const timer = setInterval(calculateTime, 1000);
                return () => clearInterval(timer);
            }, [dueDate]);

            if (!timeLeft) return null;

            const { days, hours, minutes, seconds } = timeLeft;
            let label = ""; let unit = "";
            let color = "#10B981"; let bgColor = "#ECFDF5"; let borderColor = "#10B981";
            let isUrgent = false;

            if (days > 0) {
                label = days; unit = "วัน";
                if (days <= 3) { color = "#d97706"; bgColor = "#FFFBEB"; borderColor = "#F59E0B"; } 
                else { color = "#059669"; bgColor = "#ECFDF5"; borderColor = "#10B981"; }
            } else if (hours > 0) {
                label = hours; unit = "ชม."; color = "#EA580C"; bgColor = "#FFF7ED"; borderColor = "#F97316"; isUrgent = true; 
            } else {
                label = `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`; unit = ""; 
                color = "#DC2626"; bgColor = "#FEF2F2"; borderColor = "#EF4444"; isUrgent = true; 
            }
            
            return (
                <div className={`relative flex items-center justify-center w-12 h-12 ml-3 rounded-xl shadow-sm flex-shrink-0 transition-colors duration-300 ${isUrgent ? 'animate-pulse border-red-200' : 'border-gray-100'}`} style={{ backgroundColor: bgColor }}>
                    <svg className="absolute top-0 left-0 w-full h-full transform -rotate-90 rounded-xl overflow-visible" width="48" height="48">
                        <rect x="1.5" y="1.5" width="45" height="45" rx="10" ry="10" fill="transparent" stroke={color} strokeWidth="3" strokeOpacity="0.1" />
                        <rect x="1.5" y="1.5" width="45" height="45" rx="10" ry="10" fill="transparent" stroke={color} strokeWidth="3" strokeLinecap="round" pathLength="100" strokeDasharray="100" strokeDashoffset={100 - progressPercent} className="transition-all duration-1000 ease-linear" />
                    </svg>
                    <div className="absolute flex flex-col items-center justify-center z-10">
                        <span className="text-sm font-bold leading-none" style={{ color: color }}>{label}</span>
                        {unit && <span className="text-[9px] font-bold leading-none mt-0.5 opacity-80" style={{ color: color }}>{unit}</span>}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 📱 1. หน้าต่างรายละเอียดสินค้า (สไลด์ทับหน้าหลัก แต่เว้นแถบบน)
        // ==========================================
        const OrderProductModal = ({ product, onClose, onConfirm }) => {
            const [selections, setSelections] = useState({});
            const [errors, setErrors] = useState({});
            const [qty, setQty] = useState(1);
            const [optionGroups, setOptionGroups] = useState([]);
            const [currentPrice, setCurrentPrice] = useState(product.price);
            
            const [showSizeChart, setShowSizeChart] = useState(false);
            const [currentSizeChartIndex, setCurrentSizeChartIndex] = useState(0);
            const [currentImgIndex, setCurrentImgIndex] = useState(0);

            const images = product.images && product.images.length > 0 ? product.images : (product.img ? [product.img] : []);
            const sizeCharts = product.sizeCharts && product.sizeCharts.length > 0 ? product.sizeCharts : (product.sizeChart ? [product.sizeChart] : []);

            useEffect(() => {
                if (product.options) {
                    const groups = product.options.split('|').map(group => {
                        const [name, values] = group.split(':');
                        if (name && values) {
                            return {
                                name: name.trim(),
                                choices: values.split(',').map(v => {
                                    const parts = v.split('=');
                                    const label = parts[0].trim();
                                    let priceAddOn = 0;
                                    if (parts.length > 1) {
                                        const valStr = parts[1].trim().replace('+', '');
                                        priceAddOn = Number(valStr) || 0;
                                    }
                                    return { label, price: priceAddOn };
                                })
                            };
                        }
                        return null;
                    }).filter(g => g !== null);
                    setOptionGroups(groups); setSelections({}); setErrors({});
                }
            }, [product]);

            useEffect(() => {
                let finalPrice = product.price; 
                Object.values(selections).forEach(selected => { if (selected && selected.price) finalPrice += selected.price; });
                setCurrentPrice(finalPrice);
            }, [selections, product.price]);
            
            const total = currentPrice * qty;

            const nextImage = () => setCurrentImgIndex((prev) => (prev + 1) % images.length);
            const prevImage = () => setCurrentImgIndex((prev) => (prev - 1 + images.length) % images.length);
            const nextSizeChart = (e) => { e.stopPropagation(); setCurrentSizeChartIndex((prev) => (prev + 1) % sizeCharts.length); };
            const prevSizeChart = (e) => { e.stopPropagation(); setCurrentSizeChartIndex((prev) => (prev - 1 + sizeCharts.length) % sizeCharts.length); };

            const handleConfirm = () => {
                const newErrors = {};
                let isValid = true;
                optionGroups.forEach(group => { if (!selections[group.name]) { newErrors[group.name] = true; isValid = false; } });
                if (!isValid) {
                    setErrors(newErrors);
                    Swal.fire({ toast: true, position: 'top', icon: 'warning', title: 'กรุณาเลือกตัวเลือกให้ครบ', showConfirmButton: false, timer: 2000 });
                    return;
                }
                let sizeDetail = optionGroups.length > 0 ? Object.entries(selections).map(([key, val]) => {
                        let detail = `${key}: ${val.label}`;
                        if (val.price > 0) detail += ` (+${val.price})`;
                        return detail;
                    }).join(', ') : "-";
                onConfirm({ ...product, size: sizeDetail, qty, price: currentPrice, total, img: images[0] });
            };

            const handleSelect = (groupName, choice) => {
                setSelections(prev => ({ ...prev, [groupName]: choice }));
                setErrors(prev => ({ ...prev, [groupName]: false }));
            };

            return (
                // ✅ แก้ตรงนี้: ใช้ absolute ปิดทับเนื้อหาด้านล่าง แต่ให้ Header ข้างบนโผล่
                <div className="absolute top-0 left-0 right-0 bottom-0 bg-[#F0F4F8] z-30 animate-slide-in-right overflow-y-auto no-scrollbar pb-32">
                    
                    {/* ปุ่มย้อนกลับ */}

                            <i className="fa-solid fa-chevron-left"></i>
                        </button>
                    </div>

                    <div className="px-5">
                        <div className="relative h-80 bg-gray-100 rounded-[2rem] overflow-hidden mb-6 shadow-sm border border-white">

                            {images.length > 1 && (
                                <>
                                    <button onClick={prevImage} className="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 hover:bg-white text-gray-800 rounded-full shadow-md flex items-center justify-center transition backdrop-blur-sm active:scale-95"><i className="fa-solid fa-chevron-left"></i></button>

                                    <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-2">
                                        {images.map((_, idx) => (<div key={idx} className={`h-1.5 rounded-full transition-all shadow-sm ${idx === currentImgIndex ? 'bg-white w-6' : 'bg-white/50 w-1.5'}`}></div>))}
                                    </div>
                                </>
                            )}
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-50 mb-6">
                            <h3 className="text-2xl font-extrabold text-gray-900 leading-tight">{product.name}</h3>
                            <p className="text-[#0066FF] font-black text-3xl mt-1 mb-4">{formatCurrency(currentPrice)}</p>

                                } else { 
                                    fireAutoCloseAlert('ชำระเงินสำเร็จ!', 'ขอบคุณที่ชำระเงิน').then(() => { onSuccess(); });
                                }
                            } else { fireErrorAlert('เกิดข้อผิดพลาด', res.error || res.message); }
                        }, 500);

                };
            };

            return (
                // ✅ แก้ตรงนี้: ใช้ absolute ปิดทับเนื้อหาด้านล่าง แต่ให้ Header ข้างบนโผล่
                <div className="absolute top-0 left-0 right-0 bottom-0 bg-[#F0F4F8] z-30 animate-slide-in-right overflow-y-auto no-scrollbar pb-32">

        const OrderPaymentModal = ({ order, user, onClose, onSuccess, qrMap, defaultQr }) => {

                else { fireErrorAlert('ไฟล์ขนาดใหญ่เกินไป', 'กรุณาอัปโหลดรูปภาพขนาดไม่เกิน 5MB'); }

                        fileData: reader.result.split(',')[1], mimeType: file.type

                            setIsSubmitting(false);

                        <div className="space-y-3">

                                                            <i className="fa-solid fa-file-invoice mr-1.5"></i> ใบเสร็จ
                                                        </button>

                                                    {tx.transferSlipUrl && (

        // ==========================================
        // 📱 Dashboard Main Component
        // ==========================================
        const Dashboard = ({ user, initialData, onLogout }) => {
            const [data, setData] = useState(initialData);

            const [showAnnouncement, setShowAnnouncement] = useState(false);

            const hasAccess = (menuId) => {

                return user.permissions.includes(menuId);
            };

            const fetchData = async (silent = false) => {
                if(!silent) setLoading(true);
                try { const res = await runGoogleScript('getDashboardData', [user.studentId]); setData(res); } catch(e) { console.error(e); }

            const overdueCount = data.bills ? data.bills.filter(b => b.daysLate > 0).length : 0;
            const hasBills = data.bills && data.bills.length > 0;
            const hasOrders = data.orders && data.orders.length > 0;
            
            const isSubPageOpen = selectedBill || selectedProduct || pendingOrder || selectedProject;

            const handleChangePassword = async () => {
                setShowDropdown(false);
                await Swal.fire({
                    title: 'เปลี่ยนรหัสผ่าน',
                    html: `
                        <div class="space-y-4 mt-4 text-left">
                            <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"><i class="fa-solid fa-lock"></i></span><input id="old-pass" type="password" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#0066FF] outline-none text-sm shadow-sm transition-all" placeholder="รหัสผ่านเดิม"></div>
                            <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"><i class="fa-solid fa-key"></i></span><input id="new-pass" type="password" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#0066FF] outline-none text-sm shadow-sm transition-all" placeholder="รหัสผ่านใหม่ (อย่างน้อย 6 ตัวอักษร)"></div>
                            <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400"><i class="fa-solid fa-check-double"></i></span><input id="confirm-pass" type="password" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#0066FF] outline-none text-sm shadow-sm transition-all" placeholder="ยืนยันรหัสผ่านใหม่"></div>
                        </div>
                    `,
                    showCancelButton: true, confirmButtonText: 'บันทึกรหัสผ่าน', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#0066FF', showLoaderOnConfirm: true,
                    customClass: { popup: 'rounded-3xl pb-6', title: 'text-xl font-bold text-gray-800', confirmButton: 'rounded-xl px-6 py-2.5 font-bold shadow-md text-sm', cancelButton: 'rounded-xl px-6 py-2.5 font-bold text-sm bg-gray-100 text-gray-600 hover:bg-gray-200' },
                    preConfirm: async () => {
                        const oldInput = document.getElementById('old-pass'); const newInput = document.getElementById('new-pass'); const confirmInput = document.getElementById('confirm-pass');
                        const oldP = oldInput.value; const newP = newInput.value; const cNewP = confirmInput.value;
                        [oldInput, newInput, confirmInput].forEach(el => { el.classList.remove('border-red-500', 'bg-red-50', 'ring-2', 'ring-red-200'); el.classList.add('border-gray-200', 'bg-gray-50'); });
                        const setError = (inputEl, errorMsg) => { inputEl.classList.remove('border-gray-200', 'bg-gray-50'); inputEl.classList.add('border-red-500', 'bg-red-50', 'ring-2', 'ring-red-200'); Swal.showValidationMessage(errorMsg); return false; };
                        if (!oldP) return setError(oldInput, 'กรุณากรอกรหัสผ่านเดิม'); if (!newP) return setError(newInput, 'กรุณากรอกรหัสผ่านใหม่'); if (!cNewP) return setError(confirmInput, 'กรุณายืนยันรหัสผ่านใหม่');
                        if (newP.length < 6) return setError(newInput, 'รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร'); if (newP !== cNewP) return setError(confirmInput, 'ยืนยันรหัสผ่านไม่ตรงกัน');
                        try { const res = await runGoogleScript('changePassword', [user.studentId, oldP, newP]); if (!res.success) return setError(oldInput, res.message || 'รหัสผ่านเดิมไม่ถูกต้อง'); return true; } 
                        catch(e) { Swal.showValidationMessage('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์'); return false; }
                    }
                }).then((result) => { if (result.isConfirmed) Swal.fire({ icon: 'success', title: 'สำเร็จ', text: 'เปลี่ยนรหัสผ่านเรียบร้อยแล้ว', confirmButtonText: 'ตกลง', confirmButtonColor: '#0066FF', customClass: { popup: 'rounded-3xl' } }); });
            };

            const renderMenuCard = (title, subtitle, icon, color, onClick, badge) => (

                        {/* รายการโครงการ */}

        const App = () => {
            // ✅ 1. ตั้งค่าเริ่มต้นให้ไปที่หน้า login เสมอ
            const [page, setPage] = useState('login'); 
            const [user, setUser] = useState(null);
            const [dashboardData, setDashboardData] = useState(null);
            const [loading, setLoading] = useState(false);

            // ✅ 2. ลบ useEffect ที่ใช้ตรวจสอบ localStorage เดิมออก
            // ไม่ต้องมีการดึงค่าใดๆ จากเครื่องผู้ใช้ตอนโหลดหน้าเว็บ

            const handleLogin = async (u, p) => {
                if(!u || !p) return Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
                setLoading(true);
                try {
                    const res = await runGoogleScript('loginUser', [u, p]);
                    if(res.success) {
                        // ✅ 3. ลบบรรทัด localStorage.setItem ออกทั้งหมด
                        // ข้อมูลจะเก็บไว้แค่ใน State (Memory) เท่านั้น พอรีเฟรชทุกอย่างจะหายไป
                        
                        let dashData = res.dashboardData;
                        if (!dashData) {
                             dashData = await runGoogleScript('getDashboardData', [res.studentId]);
                        }
                        
                        setUser(res); 
                        setDashboardData(dashData); 
                        setPage('dashboard');

                        if (dashData.announcement) {
                            Swal.fire({
                                html: `<div class="flex flex-col w-full"><div class="w-full bg-gradient-to-r from-blue-600 to-blue-800 p-8 text-white relative overflow-hidden flex flex-col items-center justify-center"><div class="absolute top-0 left-0 w-full h-full bg-white/10 skew-y-6"></div><div class="relative z-10 flex flex-col items-center"><div class="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mb-3 backdrop-blur-md shadow-lg"><i class="fa-solid fa-bullhorn text-3xl"></i></div><h3 class="text-2xl font-bold tracking-wide">ประกาศสำคัญ</h3></div></div><div class="w-full p-6 text-gray-700 text-lg font-medium leading-relaxed text-center bg-white whitespace-pre-wrap">${dashData.announcement}</div></div>`,
                                confirmButtonText: '<i class="fa-regular fa-circle-check mr-2"></i> รับทราบ',
                                confirmButtonColor: '#2563EB', buttonsStyling: true, padding: 0, width: '32rem',
                                customClass: { popup: 'rounded-2xl overflow-hidden', htmlContainer: '!m-0 !p-0 w-full', confirmButton: 'bg-blue-600 hover:bg-blue-700 text-white text-lg font-bold py-3 px-10 rounded-full shadow-lg mb-6 w-auto transition-transform hover:scale-105 active:scale-95' }
                            });
                        } else { 
                            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true });
                            Toast.fire({ icon: 'success', title: `ยินดีต้อนรับ คุณ${res.name}` });
                        }
                    } else { 
                        Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: res.message, customClass: { popup: 'rounded-2xl' } }); 
                    }
                } catch(e) { 
                    Swal.fire('Error', e.toString(), 'error'); 
                }
                setLoading(false);
            };

            const handleRegisterSuccess = (u) => { setPage('login'); };

            const handleLogout = () => {
                // ✅ 4. ลบบรรทัด localStorage.removeItem ออกทั้งหมด
                setUser(null); 
                setDashboardData(null);
                setPage('login'); 
            };

            return (
                <div>
                    {page === 'loading' && <Loading />} 
                    {page === 'login' && <Login onLogin={handleLogin} onRegister={() => setPage('register')} />}
                    {page === 'register' && <Register onBack={() => setPage('login')} onRegisterSuccess={handleRegisterSuccess} />}
                    {page === 'dashboard' && user && <Dashboard user={user} initialData={dashboardData} onLogout={handleLogout} />}
                    {loading && <Loading />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
