name: Deploy Firebase Functions

# สั่งให้ทำงานเมื่อมีการ Push โค้ดเข้าสาขา main (หรือแก้เป็น master ถ้าโปรเจกต์คุณใช้ master)
on:
  push:
    branches:
      - main
    # 🌟 ทำงานเฉพาะเมื่อมีการแก้ไขไฟล์ในโฟลเดอร์ functions เท่านั้น จะได้ไม่เปลืองโควต้า
    paths:
      - 'functions/**'

jobs:
  deploy_functions:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # ใช้ Node.js เวอร์ชั่น 18 (หรือ 20 ตามที่คุณติดตั้ง)

      - name: 📦 Install Dependencies
        run: npm install
        working-directory: ./functions

      - name: 🔥 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 📝 สร้างไฟล์ .env สำหรับใช้งาน
        working-directory: ./functions
        run: |
          echo "TARGET_EWALLET=${{ secrets.TARGET_EWALLET }}" >> functions/.env
          echo "SLIPOK_API_URL=${{ secrets.SLIPOK_API_URL }}" >> functions/.env
          echo "SLIPOK_API_KEY=${{ secrets.SLIPOK_API_KEY }}" >> functions/.env
          echo "LINE_ACCESS_TOKEN=${{ secrets.LINE_ACCESS_TOKEN }}" >> functions/.env
          echo "LINE_TARGET_ID=${{ secrets.LINE_TARGET_ID }}" >> functions/.env
          echo "STUDENT_LINE_ACCESS_TOKEN=${{ secrets.STUDENT_LINE_ACCESS_TOKEN }}" >> functions/.env
          echo "SERVICE_ACCOUNT_EMAIL=${{ secrets.SERVICE_ACCOUNT_EMAIL }}" >> functions/.env
          echo "SERVICE_ACCOUNT_KEY=${{ secrets.SERVICE_ACCOUNT_KEY }}" >> functions/.env
          echo "DRIVE_FOLDER_ID=${{ secrets.DRIVE_FOLDER_ID }}" >> functions/.env

      - name: 🚀 Deploy to Firebase
        run: firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }}
